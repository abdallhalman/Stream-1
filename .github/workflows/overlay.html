<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* ── شريط الإحصائيات (يمين) ── */
        .stats-bar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 16px;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 22px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }

        /* ── ساعة KSA (يسار) ── */
        #clock-box {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 10px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #clock-time {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            direction: ltr;
        }
        #clock-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            letter-spacing: 1px;
            margin-top: 2px;
            direction: ltr;
        }

        /* ── هدايا ── */
        #gift-banner-container {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 560px;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }
        .gift-banner {
            background: linear-gradient(90deg, rgba(220,0,110,0.92) 0%, rgba(90,0,220,0.92) 100%);
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 40px;
            padding: 14px 32px;
            color: white;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
            animation: bounceIn 0.5s ease-out;
            backdrop-filter: blur(8px);
        }
        .gift-banner img { width: 46px; height: 46px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); }
        .gift-text h2 { font-size: 20px; font-weight: 700; color: #fff; }
        .gift-text p  { font-size: 16px; color: #ffe066; font-weight: 600; margin-top: 3px; }

        /* ── بنر المتابعة ── */
        #follow-banner-container {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            pointer-events: none;
            z-index: 20;
        }
        .follow-banner {
            background: rgba(12, 10, 28, 0.82);
            border: 1px solid rgba(157, 93, 255, 0.5);
            border-radius: 22px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 0 40px rgba(157,93,255,0.25), 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(16px);
            animation: slideUp 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .follow-banner img {
            width: 54px; height: 54px;
            border-radius: 50%;
            border: 2px solid rgba(157,93,255,0.7);
            flex-shrink: 0;
        }
        .follow-info { flex: 1; }
        .follow-label {
            font-size: 11px;
            font-weight: 700;
            color: rgba(180,130,255,0.9);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            direction: ltr;
        }
        .follow-name {
            font-size: 21px;
            color: #ffffff;
            font-weight: 700;
            margin-top: 3px;
        }
        .follow-count {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 3px;
            direction: ltr;
            font-weight: 600;
        }
        .follow-icon { font-size: 28px; flex-shrink: 0; }

        /* ── تعليقات ── */
        #chat-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 400px;
            height: 400px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
        }
        .chat-msg {
            background: rgba(12, 12, 18, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 14px;
            margin-top: 8px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: slideInRight 0.3s ease-out;
            backdrop-filter: blur(8px);
        }
        .chat-msg .avatar { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255,188,0,0.6); flex-shrink: 0; }
        .chat-msg .badge  { width: 20px; height: 20px; object-fit: contain; }
        .chat-msg .username { color: #ffbc00; font-weight: 700; font-size: 15px; }
        .chat-msg .text     { color: rgba(255,255,255,0.9); font-size: 15px; word-break: break-word; line-height: 1.4; }

        /* ── انضمامات ── */
        #join-container {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 360px;
            height: 400px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            pointer-events: none;
        }
        .join-notification {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 18px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideInLeft 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.4s ease-out 3s forwards;
        }
        .join-notification .avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        .join-notification .name   { color: #ffffff; font-weight: 600; font-size: 15px; }
        .join-notification .action { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 1px; }

        /* ── animations ── */
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInLeft  { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideUp      { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounceIn     { 0% { opacity:0; transform:scale(0.4); } 55% { opacity:1; transform:scale(1.06); } 80% { transform:scale(0.97); } 100% { transform:scale(1); } }
        @keyframes fadeOut      { from { opacity:1; } to { opacity:0; max-height:0; padding:0; margin:0; border:none; } }
    </style>
</head>
<body>

    <!-- ساعة KSA -->
    <div id="clock-box">
        <div id="clock-time">00:00:00</div>
        <div id="clock-label">KSA · GMT+3</div>
    </div>

    <!-- إحصائيات -->
    <div class="stats-bar">
        <div id="viewers-count">👤 0</div>
        <div id="likes-count">❤️ 0</div>
    </div>

    <div id="gift-banner-container"></div>
    <div id="follow-banner-container"></div>
    <div id="chat-container"></div>
    <div id="join-container"></div>

    <script>
        // ── ساعة KSA ──
        function updateClock() {
            const now = new Date();
            const ksa = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" }));
            const h = String(ksa.getHours()).padStart(2,'0');
            const m = String(ksa.getMinutes()).padStart(2,'0');
            const s = String(ksa.getSeconds()).padStart(2,'0');
            document.getElementById("clock-time").textContent = `${h}:${m}:${s}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ── WebSocket ──
        const ws = new WebSocket("ws://localhost:8080");
        const chatContainer   = document.getElementById("chat-container");
        const joinContainer   = document.getElementById("join-container");
        const giftContainer   = document.getElementById("gift-banner-container");
        const followContainer = document.getElementById("follow-banner-container");
        const fallbackAvatar  = 'https://www.tiktok.com/favicon.ico';

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);

                if (msg.type === "viewerCount") {
                    document.getElementById("viewers-count").innerText = `👤 ${msg.data.toLocaleString()}`;
                }

                if (msg.type === "like") {
                    document.getElementById("likes-count").innerText = `❤️ ${msg.data.toLocaleString()}`;
                }

                if (msg.type === "comment") {
                    const msgDiv = document.createElement("div");
                    msgDiv.className = "chat-msg";
                    let badgesHtml = "";
                    if (msg.data.badges && Array.isArray(msg.data.badges)) {
                        msg.data.badges.forEach(b => {
                            const url = b.url || b.image?.url;
                            if (url) badgesHtml += `<img class="badge" src="${url}">`;
                        });
                    }
                    const userAvatar = msg.data.avatar || fallbackAvatar;
                    msgDiv.innerHTML = `
                        <img class="avatar" src="${userAvatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="msg-content">
                            <div><span class="username">${msg.data.name || "متابع"}</span>${badgesHtml}</div>
                            <div class="text">${msg.data.text || ""}</div>
                        </div>`;
                    chatContainer.prepend(msgDiv);
                    if (chatContainer.children.length > 15) chatContainer.removeChild(chatContainer.lastChild);
                }

                if (msg.type === "join") {
                    const joinDiv = document.createElement("div");
                    joinDiv.className = "join-notification";
                    const joinAvatar = msg.data.avatar || fallbackAvatar;
                    joinDiv.innerHTML = `
                        <img class="avatar" src="${joinAvatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="info">
                            <div class="name">${msg.data.name || "متابع جديد"}</div>
                            <div class="action">انضم إلى البث ✨</div>
                        </div>`;
                    joinContainer.prepend(joinDiv);
                    setTimeout(() => { if (joinDiv.parentNode) joinContainer.removeChild(joinDiv); }, 3500);
                }

                if (msg.type === "follow") {
                    const avatar = msg.data.avatar || fallbackAvatar;
                    const name   = msg.data.name || "متابع جديد";
                    const count  = msg.data.followerCount ? msg.data.followerCount.toLocaleString() : "";
                    followContainer.innerHTML = `
                        <div class="follow-banner">
                            <img src="${avatar}" onerror="this.src='${fallbackAvatar}'">
                            <div class="follow-info">
                                <div class="follow-label">New Follower</div>
                                <div class="follow-name">${name}</div>
                                ${count ? `<div class="follow-count">👥 متابعيك: ${count}</div>` : ""}
                            </div>
                            <div class="follow-icon">🎉</div>
                        </div>`;
                    setTimeout(() => { followContainer.innerHTML = ""; }, 4000);
                }

                if (msg.type === "gift") {
                    const giftAvatar = msg.data.avatar || fallbackAvatar;
                    giftContainer.innerHTML = `
                        <div class="gift-banner">
                            <img src="${giftAvatar}" onerror="this.src='${fallbackAvatar}'">
                            <div class="gift-text">
                                <h2>🤍 شكراً: ${msg.data.name || "داعم كريم"}</h2>
                                <p>${msg.data.giftName} × ${msg.data.count}</p>
                            </div>
                        </div>`;
                    setTimeout(() => { giftContainer.innerHTML = ""; }, 4000);
                }

            } catch (e) {
                console.error("خطأ:", e);
            }
        };
    </script>
</body>
</html>
