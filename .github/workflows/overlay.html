<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            overflow: hidden;
            position: relative;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #join-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: none;
            z-index: 50;
        }

        .join-notification {
            width: 100%;
            height: 213px;
            border-radius: 25px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideInCard 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            flex-shrink: 0;
        }

        .join-notification .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .join-notification .info { flex: 1; min-width: 0; }
        .join-notification .name {
            font-size: 38px;
            font-weight: 700;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* حاوية البيانات الديناميكية */
        .data-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .data-item { 
            font-size: 16px; color: #444; background: rgba(0,0,0,0.05);
            padding: 6px 15px; border-radius: 15px; display: flex; align-items: center; gap: 6px;
        }

        @keyframes slideInCard {
            0%   { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pushOut {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.96) translateY(20px); }
        }
    </style>
</head>
<body>
    <div id="join-container"></div>

    <script>
        const joinContainer = document.getElementById("join-container");
        const fallbackAvatar = 'https://www.tiktok.com/favicon.ico';
        const MAX = 3; // 3 بنرات فقط لتغطية الشاشة

        function addJoin(data) {
            const div = document.createElement("div");
            div.className = "join-notification";
            
            // بناء الأيقونات ديناميكياً
            let grid = `<div class="data-grid">`;
            if (data.followers) grid += `<div class="data-item">👤 ${data.followers}</div>`;
            if (data.likes) grid += `<div class="data-item">❤️ ${data.likes}</div>`;
            if (data.badges) grid += `<div class="data-item">🎖️ ${data.badges}</div>`;
            grid += `</div>`;

            div.innerHTML = `
                <img class="avatar" src="${data.avatar}" onerror="this.src='${fallbackAvatar}'">
                <div class="info">
                    <div class="name">${data.name}</div>
                    ${grid}
                </div>`;

            joinContainer.prepend(div);

            if (joinContainer.children.length > MAX) {
                const last = joinContainer.lastChild;
                last.style.animation = "pushOut 0.35s ease forwards";
                setTimeout(() => { if (last.parentNode) last.remove(); }, 350);
            }
        }

        const ws = new WebSocket("ws://localhost:8080");

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "join") {
                    addJoin({
                        name: msg.data.name || "متابع جديد",
                        avatar: msg.data.avatar || fallbackAvatar,
                        followers: msg.data.followers,
                        likes: msg.data.likes,
                        badges: msg.data.badges
                    });
                }
            } catch (e) {
                console.error("خطأ:", e);
            }
        };
    </script>
</body>
</html>
