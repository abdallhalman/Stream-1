<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive TikTok Overlay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 1280px;
            height: 720px;
            background: transparent;
            overflow: hidden;
            font-family: sans-serif;
            position: relative;
        }

        /* Stats Area */
        #stats-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }
        .stat-box {
            background: rgba(17, 17, 17, 0.85);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #viewer-box { border-left: 4px solid #00ffcc; }
        #likes-box { border-left: 4px solid #ff4444; }

        /* Chat Stream Area */
        #chat-container {
            position: absolute;
            bottom: 100px;
            left: 20px;
            width: 420px;
            height: 400px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            gap: 8px;
        }
        .chat-msg {
            background: rgba(26, 15, 46, 0.88);
            border: 1px solid rgba(192, 132, 252, 0.5);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease-out forwards;
            max-width: 100%;
        }
        .chat-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }
        .badge-img {
            height: 16px;
            object-fit: contain;
        }
        .chat-content {
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            word-break: break-word;
            line-height: 1.4;
        }
        .user-name { color: #00ffff; margin-right: 5px; }

        /* Floating Hearts Engine Styles */
        .floating-heart {
            position: absolute;
            bottom: 30px;
            right: 120px;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 999;
            animation: flyUp 2s linear forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flyUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.8) translateX(0);
            }
            50% {
                transform: translateY(-300px) scale(1.2) translateX(var(--wobble));
            }
            100% {
                opacity: 0;
                transform: translateY(-600px) scale(0.8) translateX(calc(var(--wobble) * 2));
            }
        }
    </style>
</head>
<body>

    <div id="stats-container">
        <div id="viewer-box" class="stat-box">👥 LIVE: <span id="viewer-count">0</span></div>
        <div id="likes-box" class="stat-box">❤️ LIKES: <span id="likes-count">0</span></div>
    </div>

    <div id="chat-container"></div>

    <script>
        const ws = new WebSocket("ws://localhost:8080");
        const chatContainer = document.getElementById("chat-container");
        const viewerCountEl = document.getElementById("viewer-count");
        const likesCountEl = document.getElementById("likes-count");

        ws.onopen = () => {
            console.log("HTML Webcast Connected to WebSocket Server Successfully.");
        };

        ws.onmessage = (event) => {
            const pack = JSON.parse(event.data);
            const type = pack.type;
            const data = pack.data;

            if (type === "viewerCount") {
                viewerCountEl.innerText = Number(data).toLocaleString();
            }
            else if (type === "like") {
                likesCountEl.innerText = Number(data).toLocaleString();
            }
            else if (type === "triggerHearts") {
                spawnHearts(data);
            }
            else if (type === "comment") {
                addGenericRow(data.avatar, data.name, data.text, data.badges);
            }
            else if (type === "join") {
                addGenericRow(data.avatar, data.name, "joined the live chat ✨", [], "#00ffcc");
            }
            else if (type === "gift") {
                addGenericRow(data.avatar, data.name, `sent ${data.giftName} x${data.count} 🎁`, [], "#ffa500");
            }
        };

        function addGenericRow(avatarUrl, name, text, badges = [], textColor = "#ffffff") {
            const div = document.createElement("div");
            div.className = "chat-msg";
            if (textColor !== "#ffffff") {
                div.style.borderColor = textColor;
            }

            // Safe Avatar Injection
            const imgUrl = avatarUrl || "https://www.tiktok.com/favicon.ico";
            let htmlString = `<img class="chat-avatar" src="${imgUrl}" onerror="this.src='https://www.tiktok.com/favicon.ico'">`;

            // Safe Badges Injection
            if (Array.isArray(badges)) {
                badges.forEach(bUrl => {
                    if (bUrl) htmlString += `<img class="badge-img" src="${bUrl}">`;
                });
            }

            htmlString += `<div class="chat-content"><span class="user-name" style="color:${textColor === '#ffffff' ? '#00ffff' : textColor}">${name}:</span>${text}</div>`;
            div.innerHTML = htmlString;

            chatContainer.insertBefore(div, chatContainer.firstChild);

            if (chatContainer.children.length > 10) {
                chatContainer.removeChild(chatContainer.lastChild);
            }
        }

        function spawnHearts(count) {
            const maxHearts = Math.min(count, 15); 
            for (let i = 0; i < maxHearts; i++) {
                setTimeout(() => {
                    const heart = document.createElement("div");
                    heart.className = "floating-heart";
                    heart.innerText = "❤️";
                    
                    const wobble = (Math.random() * 120 - 60) + "px";
                    const randomX = (Math.random() * 80 - 40) + "px";
                    
                    heart.style.setProperty('--wobble', wobble);
                    heart.style.right = `calc(120px + ${randomX})`;
                    
                    document.body.appendChild(heart);
                    
                    heart.addEventListener("animationend", () => {
                        heart.remove();
                    });
                }, i * 100);
            }
        }
    </script>
</body>
</html>
