<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TikTok Live Overlay</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 1280px;
            height: 720px;
            background-color: transparent;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        #stats-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        .stat-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .heart-icon { color: #ff2b55; }
        .user-icon { color: #00f2fe; }

        #chat-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 450px;
            height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 10px;
            overflow: hidden;
        }

        .chat-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            border-radius: 15px;
            animation: slideIn 0.4s ease-out forwards;
            max-width: 100%;
            border-left: 4px solid #00f2fe;
        }
        .chat-card.join-card {
            border-left: 4px solid #25d366;
            background: rgba(0, 50, 0, 0.6);
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }
        .text-content {
            display: flex;
            flex-direction: column;
            color: white;
        }
        .username {
            font-size: 15px;
            font-weight: bold;
            color: #ff2b55;
        }
        .join-card .username {
            color: #25d366;
        }
        .message {
            font-size: 16px;
            margin-top: 2px;
            word-break: break-word;
            color: #ffffff;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #hearts-fly-zone {
            position: absolute;
            bottom: 0;
            right: 50px;
            width: 150px;
            height: 500px;
            pointer-events: none;
        }
        .floating-heart {
            position: absolute;
            bottom: 0;
            font-size: 24px;
            animation: flyUp 3s linear forwards;
            opacity: 0;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5) translateX(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(-50px) scale(1.2); }
            100% { transform: translateY(-500px) scale(0.8) translateX(var(--random-x)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="stats-container">
        <div class="stat-box">
            <span class="user-icon">👤</span>
            <span id="viewer-count">0</span>
        </div>
        <div class="stat-box">
            <span class="heart-icon">❤️</span>
            <span id="like-count">0</span>
        </div>
    </div>

    <div id="chat-container"></div>

    <div id="hearts-fly-zone"></div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const viewerCountEl = document.getElementById('viewer-count');
        const likeCountEl = document.getElementById('like-count');
        const heartsZone = document.getElementById('hearts-fly-zone');

        const eventQueue = [];
        const MAX_VISIBLE_CARDS = 6; 
        const DISPLAY_INTERVAL = 1200; 

        const ws = new WebSocket('ws://localhost:8080');

        ws.onopen = () => console.log('Connected to Server Data Stream!');
        ws.onclose = () => console.log('Data Stream Closed.');

        ws.onmessage = (event) => {
            const packet = JSON.parse(event.data);
            
            if (packet.type === 'viewerCount') {
                viewerCountEl.textContent = Number(packet.data.viewerCount).toLocaleString();
            } 
            else if (packet.type === 'like') {
                likeCountEl.textContent = Number(packet.data.totalLikeCount).toLocaleString();
                createFloatingHeart(); 
            } 
            else if (packet.type === 'comment' || packet.type === 'join') {
                eventQueue.push({ type: packet.type, data: packet.data });
            }
        };

        setInterval(() => {
            if (eventQueue.length > 0) {
                const nextEvent = eventQueue.shift();
                
                if (eventQueue.length > 30) {
                    eventQueue.splice(0, eventQueue.length - 10);
                }

                renderCard(nextEvent);
            }
        }, DISPLAY_INTERVAL);

        function renderCard(eventItem) {
            const card = document.createElement('div');
            card.className = `chat-card ${eventItem.type === 'join' ? 'join-card' : ''}`;

            const avatarUrl = eventItem.data.profilePictureUrl || 'https://www.tiktok.com/favicon.ico';
            const name = eventItem.data.nickname || eventItem.data.uniqueId;
            const messageText = eventItem.type === 'join' ? 'joined the live' : eventItem.data.comment;

            card.innerHTML = `
                <img class="avatar" src="${avatarUrl}" onerror="this.src='https://www.tiktok.com/favicon.ico'">
                <div class="text-content">
                    <span class="username">${name}</span>
                    <span class="message">${messageText}</span>
                </div>
            `;

            chatContainer.appendChild(card);

            const currentCards = chatContainer.getElementsByClassName('chat-card');
            if (currentCards.length > MAX_VISIBLE_CARDS) {
                chatContainer.removeChild(currentCards[0]);
            }
        }

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            const heartTypes = ['❤️', '💖', '💝', '💕', '💗'];
            heart.textContent = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            
            const randomX = (Math.random() * 100 - 50) + 'px';
            heart.style.setProperty('--random-x', randomX);
            heart.style.left = Math.random() * 80 + 'px';

            heartsZone.appendChild(heart);

            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
