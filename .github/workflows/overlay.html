    <title>Stream Overlay Premium</title>

      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {

            background: transparent !important;
            overflow: hidden;
            /* ── طبقة تأثير الصوت ── */
    #audio-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 1280px; height: 720px;
    background: #000000;
    opacity: 0.15;
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.1s ease;
}
            position: relative;
            font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
           -webkit-font-smoothing: antialiased;
        }

        /* ── 1. الساعة المصغرة بدون ثواني (فوق يسار) ── */
        .clock-box {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 100;
            will-change: transform, opacity;
        }
        .clock-time {
            font-size: 21px; /* تصغير الخط */
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            direction: ltr;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1) !important;
            transform: translate3d(0, 0, 0); 
            will-change: transform, opacity;
        }
        .clock-label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 1px;
        }

        
        /* ── شريط الإحصائيات (فوق يمين) ── */
        .stats-bar {
           position: absolute;
           top: 25px;
           right: 25px;
           display: flex;
           gap: 20px;
           font-size: 21px;
           font-weight: 700;
           color: #ffffff;
           letter-spacing: 0.5px;
           background: rgba(0, 0, 0, 0.55);
           backdrop-filter: blur(15px);
           -webkit-backdrop-filter: blur(15px);
           padding: 10px 25px;
           border-radius: 16px;
           border: 1px solid rgba(255, 255, 255, 0.12);
           z-index: 100;
           will-change: transform, opacity;
       }

        /* ── بنر الهدايا الذكي والمطور ── */
  #gift-banner-container {
    position: absolute;
    top: 160px;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: max-content; 
    max-width: 90%; 
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    z-index: 900;
}


.gift-banner {
    background: rgba(30, 20, 50, 0.92); 
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 2px solid #ffbc00; 
    border-radius: 24px; 
    padding: 18px 32px; 
    color: white;
    display: flex;
    align-items: center;
    gap: 24px; 
    box-shadow: 0 15px 50px rgba(255, 188, 0, 0.25), 0 0 25px rgba(255, 188, 0, 0.15);
    animation: bounceIn 0.05s linear forwards;
    will-change: transform, opacity;
    min-width: 420px; 
}
/* 👤 كود صورة الشخص (الداعم) - استهداف مباشر للصورة داخل صندوق النصوص لتظل دائرية ومحمية */
.gift-banner div img {
    width: 44px !important;
    height: 44px !important;
    border-radius: 50% !important;  /* 🎯 دائرية كاملة وصارمة للشخص فقط */
    object-fit: cover !important;
    border: 2px solid rgba(255, 255, 255, 0.6) !important;
    animation: none !important;
    transform: scale(1) !important;
    margin-left: 0 !important;
}

/* 👑 كود صورة الهدية - استهداف مباشر وحصري عبر الكلاس النيون اللي وفره الجافا سكريبت */
.gift-banner .gift-icon-neon {
    width: 85px !important; 
    height: 85px !important;
    object-fit: contain !important; /* 🎯 تظهر كاملة بدون أي تمطيط أو اقتطاع */
    border-radius: 0% !important;  /* 🚫 إلغاء الدائرة تماماً لتتحرر أطراف الهدية الشفافة */
    border: none !important;        
    flex-shrink: 0 !important;
    filter: drop-shadow(0 0 15px #ffbc00) !important; 
    animation: none !important;
    transform: scale(1) !important;
}

.gift-text h2 {
    font-size: 22px; 
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    margin: 0;
}

.gift-text p {
    font-size: 17px; 
    color: #ffff00; 
    font-weight: 700;
    margin-top: 4px;
    margin-bottom: 0;

    font-family: 'IBM Plex Sans Arabic', sans-serif;
}

/* 🔥 عداد التكرار والـ X - وضوح خارق وحجم ضخم ينبض بحماس */
.count-pop {
    animation: popScale 0.15s ease-out;
    color: #ffffff !important;
    background: linear-gradient(135deg, #ff0055, #ff00aa); 
    padding: 6px 16px;

    font-family: Arial, sans-serif; 
}


            /* ─── بنر المتابعة الذكي والمطور (نسخة السنتر والأفاتار اليميني) ─── */
#follow-banner-container {
    position: absolute;
    bottom: 90px;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 540px;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 200;
}

.follow-banner {
    background: rgba(20, 15, 30, 0.75); /* خلفية ملكية زجاجية شفافة */

    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50px;
    padding: 10px 20px;
    display: flex;

    gap: 20px; /* مسافة ثابتة وموزونة بين الأفاتار والنصوص */

    min-width: 320px;
    box-sizing: border-box;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    animation: slideUp 0.05s linear forwards !important;
    will-change: transform, opacity;
}

/* القسم الأيمن (صار يميناً الآن): يحتوي على الصورة والاسم بجانبها */
.follow-left-part {
    display: flex;
    flex-direction: row-reverse; /* وضع الصورة يمين الاسم مباشرة */

}

/* حاوية النصوص */
.follow-text-group {

}

.follow-label {

}

.follow-name {
    font-size: 20px;

}

/* القسم الأيسر (صار يساراً الآن): العداد */
.follow-right-part {

}

.follow-count-box {

.follow-count-icon {

}

}

.follow-avatar-box {

}

.follow-banner img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid #ffbc00; /* إطار ذهبي رفيع */
    object-fit: cover;
        }
    

        .follow-banner img { width: 56px; height: 56px; border-radius: 50%; border: 2px solid rgba(157, 93, 255, 0.7); flex-shrink: 0; }
        .follow-info { flex: 1; }
        .follow-label { font-size: 12px; font-weight: 700; color: rgba(180, 130, 255, 0.9); letter-spacing: 1.5px; text-transform: uppercase; }
        .follow-name { font-size: 24px; color: #ffffff; font-weight: 700; margin-top: 2px; }
        .follow-count { font-size: 16px; color: rgba(255, 255, 255, 0.8); margin-top: 3px; font-weight: 600; }

        /* ── 2. صندوق التعليقات المحسّن (قصير + تأثير التلاشي التدرجي للذكاء البصري iOS) ── */
        #chat-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 380px;
            height: 600px; /* تقصير الصندوق لحمايته من التمدد للأعلى */
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            z-index: 50;
            /* سر صناعة قناع التلاشي التدريجي الـ iOS الخيالي */
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.8) 20%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.3) 70%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0.1) 90%, rgba(0,0,0,0) 100%);
             mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.8) 20%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.3) 70%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0.1) 90%, rgba(0,0,0,0) 100%);
          }
        
                /* تطابق كامل ومثالي مع حواف كروت الانضمام ونظام الـ iOS الرفيع */
        .chat-msg {
            background: rgba(12, 12, 18, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); /* خط الحافة الرفيع الحاد والممتاز */
            color: #ffffff;
            padding: 6px 12px; /* 🛠️ تم تقليل التباعد الداخلي لإعطاء مساحة أكبر للنص */
            border-radius: 14px; /* 🛠️ حواف أنعم تتناسب مع الحجم الجديد */
            margin-top: 8px;
            display: flex;
            align-items: flex-start; /* 🛠️ السماح للصندوق بالتمدد لأسفل مع الأسطر الكثيرة */
            gap: 10px;
            /* استخدام نفس نظام أنيميشن الـ الانضمام الناعم والمريح للعين */
            animation: slideInRight 0.05s linear forwards;
         }
        #chat-container .chat-msg:nth-child(1) { opacity: 1; }
        #chat-container .chat-msg:nth-child(2) { opacity: 0.75; }
        #chat-container .chat-msg:nth-child(3) { opacity: 0.5; }
        #chat-container .chat-msg:nth-child(n+4) { opacity: 0.25; }
        
        .chat-msg .avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255, 188, 0, 0.6); flex-shrink: 0; }
        .chat-msg .badge  { width: 18px; height: 18px; object-fit: contain; vertical-align: middle; margin-left: 4px; }
        .chat-msg .msg-content { flex-grow: 1; min-width: 0; line-height: 1.4; }

         /* ── تطبيق خطوط النظام الذكية المدمجة ── */
    .chat-msg .username { 
    color: #ffbc00; 
    font-weight: 700; 
    font-size: 16px; 
    display: inline; 
    font-family: 'IBM Plex Sans Arabic', sans-serif; /* 🍏 خط أبل المتناسق */
} 
    .chat-msg .text { 
    color: rgba(255, 255, 255, 0.95); 
    font-size: 16px; 
    word-break: break-word; 
    font-weight: 500; 
    display: inline; 
    margin-right: 6px; 
    font-family: 'IBM Plex Sans Arabic', sans-serif; /* 🍏 خط أبل المتناسق */
}



        /* ── صندوق الانضمامات المستقر ── */
        #join-container {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 360px;
            height: 350px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            pointer-events: none;
            z-index: 50;
        }
        .join-notification {
            background: rgba(20, 20, 30, 0.60);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 13px 16px;
            border-radius: 18px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 13px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
            animation: slideInLeft 0.05s linear forwards, fadeOut 0.05s linear 5.5s forwards;

        }
        .join-notification .avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.4); }
        .join-notification .name   { color: #ffffff; font-weight: 700; font-size: 16px; }
        .join-notification .action { color: rgba(255, 255, 255, 0.55); font-size: 13px; margin-top: 2px; font-weight: 600; }

    
        @keyframes slideInLeft  { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes slideInRight { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes slideUp      { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes bounceIn     { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes fadeOut      { from { opacity: 1; } to { opacity: 0; } }
        @keyframes popScale     { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #fff; } 100% { transform: scale(1); } }

              /* ─── 1. تصميم عداد التسبيح الزجاجي المطور ─── */
        .tasbih-container {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .tasbih-progress-bg {
            position: relative;
            width: 100%;
            height: 44px;
            background: rgba(255, 192, 203, 0.25); /* خلفية زهرية زجاجية خفيفة */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 182, 193, 0.4);
            border-radius: 22px; /* حواف غير حادة */
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tasbih-progress-bar {
            position: absolute;
            top: 00%;
            right: 0; /* يمتلئ من اليمين لليسار */
            height: 100%;
            background: #39FF14; /* أخضر فسفوري مشع */
            box-shadow: 0 0 12px #39FF14, 0 0 25px #39FF14, inset 0 0 6px #ffffff;
            transition: width 0.25s cubic-bezier(0.1, 0.8, 0.3, 1);
            z-index: 1;
        }

        .tasbih-numbers {
            position: relative;
            z-index: 2;
            font-family: 'Inter', 'IBM Plex Sans Arabic', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 2px rgba(0, 0, 0, 0.8);
            transition: transform 0.1s ease;
        }

        .tasbih-numbers.bump { transform: scale(1.15); }

        .tasbih-subtext {
            width: 80%;
            text-align: center;
            margin-top: 6px;
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* ─── 2. فقاعات التسبيح المتطايرة ─── */
        .subhan-bubble {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 90;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            will-change: transform, opacity;
            animation: bubbleFloatUp var(--duration) ease-out forwards;
        
            }

        @keyframes bubbleFloatUp {
          0% { transform: translateY(-50px); opacity: 0; }
          15% { opacity: 1; }
          100% { transform: translateY(500px); opacity: 0; }
    }


        /* ─── 3. القلوب النيونية المتطايرة من الزاوية ─── */
        .heart-glow {
            position: absolute;
            bottom: 20px;
            right: 40px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.75;
            will-change: transform, opacity;
            animation: flyAndFade var(--duration) cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes flyAndFade {
            0% { transform: translate(0, 0) scale(0.3) rotate(0deg); opacity: 0; }
            15% { opacity: 0.85; }
            100% { transform: translate(var(--target-x), var(--target-y)) scale(var(--scale)) rotate(var(--rotate)); opacity: 0; }
        }

        /* ─── 4. بنر الهدف اللحظي المتفجر ─── */
        .milestone-banner {
            position: absolute;
            top: 0; left: 0; width: 1280px; height: 720px;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;

            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;

            padding: 40px 60px;
            border-radius: 30px;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
        .milestone-banner.show .milestone-content { transform: scale(1); }
        .milestone-content h1 { color: #fff; font-size: 36px; font-weight: 700; font-family: 'IBM Plex Sans Arabic', sans-serif; }

    <script>
        // تحديث الساعة بدون ثواني
        function updateClock() {
            const now = new Date();
            const ksa = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" }));
            const h = String(ksa.getHours()).padStart(2, '0');
            const m = String(ksa.getMinutes()).padStart(2, '0');
            document.getElementById("clock-time").textContent = `${h}:${m}`;
        }
        updateClock();
        setInterval(updateClock, 10000); // تحديث هادئ كل 10 ثوانٍ لعدم إجهاد الصفحة

        const ws = new WebSocket("ws://localhost:8080");
        const chatContainer   = document.getElementById("chat-container");
        const joinContainer   = document.getElementById("join-container");
        const giftContainer   = document.getElementById("gift-banner-container");
        const followContainer = document.getElementById("follow-banner-container");
        const fallbackAvatar  = 'https://www.tiktok.com/favicon.ico';

        // متغيرات ذكية لحفظ الذاكرة اللحظية للبث ومنع التكرار البصري
        let currentGiftUser  = null;
        let currentGiftName  = null;
        let currentGiftCount = 0;
        let giftTimer        = null;

        let currentFollowUser = null;
        let followTimer       = null;

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);

                 if (msg.type === "viewerCount") {
                 document.getElementById("viewers-count").innerText = `👤 ${msg.data.toLocaleString()}`;
                 }
                if (msg.type === "audioLevel") {
                const level = msg.data;
                const overlay = document.getElementById("audio-overlay");
                if (overlay) overlay.style.opacity = 0.15 - (level * 0.15);
                }
            // ─── متغيرات نظام تعاقب الأذكار الذكي المطور ───
            const STEP_TARGET = 1000; // الهدف المتكرر
            
            // قائمة الأذكار المرتبطة (الذكر الأساسي + الجملة الفرعية الشاملة له)
              const azkarList = [
                { main: "سبحان الله", sub: "سبحان الله وبحمده، سبحان الله العظيم 🌿" },
                { main: "الحمد لله", sub: "الحمد لله حمدا كثيرا طيبا مباركا فيه 🤍" },
                { main: "لا إله إلا الله", sub: "لا إله إلا الله وحده لا شريك له 🌌" },
                { main: "الله أكبر", sub: "الله أكبر كبيرا، والحمد لله كثيرا ⚔️" },
                { main: "أستغفر الله", sub: "أستغفر الله العظيم وأتوب إليه 🕋" }
            ];


            if (msg.type === "like") {
                // تحديث العداد المستقر العلوي التقليدي إن وجد
                const topLikes = document.getElementById("likes-count");
                if (topLikes) topLikes.innerText = `❤️ ${msg.data.toLocaleString()}`;

                // 1. تحديد المرحلة الحالية بناءً على إجمالي اللايكات لتبديل الأذكار
                let currentStage = Math.floor(msg.data / STEP_TARGET);
                let currentLikes = msg.data % STEP_TARGET;
                
                if (currentLikes === 0 && msg.data > 0) { 
                    currentLikes = STEP_TARGET; 
                    currentStage = currentStage - 1; // تثبيت المرحلة الحالية عند لحظة الامتلاء التام
                }

                // سحب الكائن (Object) الخاص بالذكر الحالي والذكر القادم من القائمة المترابطة
                const currentItem = azkarList[currentStage % azkarList.length];
                const nextItem = azkarList[(currentStage + 1) % azkarList.length];

                // 2. تحديث شريط التقدم الفسفوري والأرقام والنص السفلي المترابط
                const percentage = (currentLikes / STEP_TARGET) * 100;
                const bar = document.getElementById("tasbih-bar");
                const txt = document.getElementById("tasbih-text");
                const subtxt = document.querySelector(".tasbih-subtext");
                
                if (bar) bar.style.width = `${percentage}%`;
                if (txt) {
                    txt.innerText = `${currentLikes.toLocaleString()} / ${STEP_TARGET.toLocaleString()}`;
                    txt.classList.add("bump");
                    setTimeout(() => txt.classList.remove("bump"), 100);
                }
                
                // [التحديث الذكي لقفل الجملة] يغير النص الفرعي بناءً على الذكر الحالي بدقة وبطول 80%
                if (subtxt) {
                    subtxt.innerText = currentItem.sub;
                }

                // 3. إطلاق فقاعة التسبيح اللطيفة تحمل (الذكر الأساسي) وهي تتساقط للأسفل
                const bubbleColors = [
                    'rgba(255, 105, 180, 0.85)', /* وردي */
                    'rgba(0, 206, 209, 0.85)',   /* فيروزي */
                    'rgba(148, 0, 211, 0.85)',   /* بنفسجي */
                    'rgba(255, 165, 0, 0.85)',   /* برتقالي ناعم */
                    'rgba(57, 255, 20, 0.9)'     /* أخضر فسفوري */
                ];
                const randomColor = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
                
                const bubble = document.createElement('div');
                bubble.className = 'subhan-bubble';
                bubble.innerText = `${currentItem.main}`; // تأخذ العنوان الأساسي الخفيف للفقاعات
                bubble.style.background = randomColor;
                bubble.style.border = `1.5px solid rgba(255,255,255,0.7)`;
                
                const bStartX = (Math.random() * 60 - 30) + 'px'; 
                const bTargetX = (Math.random() * 180 - 90) + 'px'; 
                const bTargetY = (Math.random() * 200 + 120) + 'px'; // سقوط ناعم لأسفل العداد
                const bDuration = (Math.random() * 1.2 + 1.5) + 's';

                bubble.style.setProperty('--start-x', bStartX);
                bubble.style.setProperty('--target-x', bTargetX);
                bubble.style.setProperty('--target-y', bTargetY);
                bubble.style.setProperty('--duration', bDuration);

                document.body.appendChild(bubble);
                setTimeout(() => bubble.remove(), 2500);

                // 4. تفعيل البنر الانفجاري عند اكتمال الـ 1000 والإعلان عن الانتقال للذكر الجديد
                if (currentLikes === STEP_TARGET) {
                    const banner = document.getElementById("milestone-banner");
                    const bTitle = document.getElementById("milestone-title");
                    if (banner && bTitle) {
                        bTitle.innerHTML = `كفووو! تم اكتمال عداد <span style="color:#39FF14;">(${currentItem.main})</span> 🎉<br><span style="font-size:24px; color:#ffcc00; display:block; margin-top:10px;">الذكر التالي: ${nextItem.main} 🌿</span>`;
                        banner.classList.add("show");
                        
                        setTimeout(() => {
                            banner.classList.remove("show");
                            if (bar) bar.style.width = "0%";
                            if (txt) txt.innerText = `0 / ${STEP_TARGET.toLocaleString()}`;
                            if (subtxt) subtxt.innerText = nextItem.sub; // يقلب النص الفرعي فوراً للهدف التالي
                        }, 4000);
                    }
                }
            }


                if (msg.type === "comment") {
                    const msgDiv = document.createElement("div");
                    msgDiv.className = "chat-msg";
                    let badgesHtml = "";
                    if (msg.data.badges && Array.isArray(msg.data.badges)) {
                    msg.data.badges.forEach(b => {
                    const url = b.url || b.image?.url;
                    if (url) badgesHtml += `<img class="badge" src="${url}">`;
                        });
                }
                    const userAvatar = msg.data.avatar || fallbackAvatar;
                     msgDiv.innerHTML = `
                        <img class="avatar" src="${userAvatar}" onerror="this.src='${fallbackAvatar}'" style="margin-top: 2px;">
                        <div class="msg-content">
                            ${badgesHtml}
                            <span class="username">${msg.data.name || "متابع"}: </span>
                            <span class="text">${msg.data.text || ""}</span>
                        </div>`;

                    chatContainer.prepend(msgDiv);
                    if (chatContainer.children.length > 15) chatContainer.removeChild(chatContainer.lastChild);
                }

                if (msg.type === "join") {
                    const joinDiv = document.createElement("div");
                    joinDiv.className = "join-notification";
                    const joinAvatar = msg.data.avatar || fallbackAvatar;
                    joinDiv.innerHTML = `
                        <img class="avatar" src="${joinAvatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="info">
                            <div class="name">${msg.data.name || "متابع جديد"}</div>
                            <div class="action">انضم إلى البث الآن ✨</div>
                        </div>`;
                    joinContainer.prepend(joinDiv);
                    setTimeout(() => { if (joinDiv.parentNode) joinContainer.removeChild(joinDiv); }, 7000);
                }

                // ── منطق المتابعة الذكي المتتالي ──
                if (msg.type === "follow") {
                    const name   = msg.data.name || "متابع جديد";
                    const avatar = msg.data.avatar || fallbackAvatar;
                    const count  = msg.data.followerCount ? Number(msg.data.followerCount).toLocaleString() : "";

                    clearTimeout(followTimer);
                    currentFollowUser = name;

                   followContainer.innerHTML = `
        <div id="follow-banner-container">
            <div class="follow-banner">
                <div class="follow-left-part">
                    <div class="follow-avatar-box">
                        <img id="follow-avatar" src="${avatar}" alt="avatar">
                    </div>
                    <div class="follow-text-group">
                        <span class="follow-label">Follow 👤</span>
                        <div class="follow-name" id="follow-name">${name}</div>
                    </div>
                </div>
                
                <div class="follow-right-part">
                    <div class="follow-count-box">
                        <span class="follow-count-icon">👥</span>
                        <span class="follow-count" id="follow-count">${count || '0'}</span>
                    </div>
                </div>
            </div>
        </div>
        `;

                    followTimer = setTimeout(() => {
                        followContainer.innerHTML = "";
                        currentFollowUser = null;
                    }, 7000);
                }
                                // ── كود معالجة الهدايا المطور مع جلب وعرض الأيقونة الرسمية فخمة ──
                if (msg.type === "gift") {
                    const name     = msg.data.name || "داعم كريم";
                    const giftName = msg.data.giftName;
                    const avatar   = msg.data.avatar || fallbackAvatar;
                    const newCount = msg.data.count || 1;
                    const giftIcon = msg.data.giftIcon || ""; // الرابط المؤمن القادم من السيرفر

                    if (currentGiftUser === name && currentGiftName === giftName) {
                        currentGiftCount += newCount;
                        clearTimeout(giftTimer);
                        
                        const countEl = document.getElementById("gift-counter-hit");
                        if (countEl) {
                            countEl.innerText = `${giftName} × ${currentGiftCount}`;
                            countEl.classList.remove("count-pop");
                            void countEl.offsetWidth; 
                            countEl.classList.add("count-pop");
                        }
                    } else {
                        currentGiftUser  = name;
                        currentGiftName  = giftName;
                        currentGiftCount = newCount;
                        clearTimeout(giftTimer);

                        // تجهيز أيقونة الهدية بتأثير نبض مبهج ومنفصل في اليسار
                        const giftImgHtml = giftIcon ? `<img src="${giftIcon}" class="gift-icon-neon" style="width: 45px; height: 45px; object-fit: contain; animation: popScale 0.4s infinite alternate; filter: drop-shadow(0 0 8px rgba(255,188,0,0.5));">` : "";

                        giftContainer.innerHTML = `
                            <div class="gift-banner" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                                <div style="display: flex; align-items: center; gap: 14px;">
                                    <img src="${avatar}" onerror="this.src='${fallbackAvatar}'" style="width: 48px; height: 48px; border-radius: 50%; border: 2px solid #ffbc00; flex-shrink: 0;">
                                    <div class="gift-text">
                                        <h2 style="font-size: 16px; font-weight: 700; color: #fff; margin: 0; font-family: 'IBM Plex Sans Arabic', sans-serif;"> 🤍 شكراً: ${name}</h2>
                                        <p id="gift-counter-hit" class="count-pop" style="margin-top: 4px; font-family: 'IBM Plex Sans Arabic', sans-serif;">${giftName} × ${currentGiftCount}</p>
                                    </div>
                                </div>
                                <div style="margin-right: auto; padding-right: 5px; display: flex; align-items: center;">
                                    ${giftImgHtml} </div>
                            </div>`;
                    }

                    giftTimer = setTimeout(() => {
                        giftContainer.innerHTML = "";
                        currentGiftUser  = null;
                        currentGiftName  = null;
                        currentGiftCount = 0;
                    }, 7000);
                }
            } catch (e) {
                console.error("خطأ في التحليل:", e);
            }
        };
    </script>
</body>
    </html>
