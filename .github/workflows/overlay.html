<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            overflow: hidden;
            position: relative;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #join-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 1280px;
            height: 720px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 18px 24px;
            overflow: hidden;
            pointer-events: none;
            z-index: 50;
        }

        /* الكرت — نفس تصميم الأصلي لكن أكبر */
        .join-notification {
            width: 100%;
            height: 210px;          /* 3 كروت × 210 + gaps تملأ 720 */
            border-radius: 22px;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.13);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
            animation: slideInCard 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            flex-shrink: 0;
        }

        /* ── يمين: أفاتار + معلومات ── */
        .join-right {
            display: flex;
            align-items: center;
            gap: 28px;
            flex: 1;
            min-width: 0;
        }

        .join-notification .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.35);
            object-fit: cover;
            flex-shrink: 0;
        }

        .join-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .join-app-label {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 6px;
        }

        .join-name {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            line-height: 1.1;
        }

        .join-action {
            font-size: 22px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        /* ── يسار: عدد المتابعين والمستوى ── */
        .join-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            padding-left: 10px;
        }

        .followers-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 12px 20px;
            min-width: 120px;
        }

        .followers-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .followers-count {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }

        .followers-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            font-weight: 600;
        }

        .level-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 188, 0, 0.15);
            border: 1px solid rgba(255, 188, 0, 0.3);
            border-radius: 14px;
            padding: 8px 16px;
        }

        .level-text {
            font-size: 18px;
            font-weight: 700;
            color: #ffbc00;
        }

        @keyframes slideInCard {
            0%   { opacity: 0; transform: translateY(-28px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pushOut {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.96) translateY(12px); }
        }
    </style>
</head>
<body>
    <div id="join-container"></div>

    <script>
        const joinContainer  = document.getElementById("join-container");
        const fallbackAvatar = 'https://www.tiktok.com/favicon.ico';

        const colors = [
            'rgba(147, 197, 253, 0.32)',
            'rgba(196, 181, 253, 0.32)',
            'rgba(249, 168, 212, 0.32)',
            'rgba( 94, 234, 212, 0.32)',
            'rgba(253, 224, 132, 0.32)',
            'rgba(134, 239, 172, 0.32)',
            'rgba(252, 165, 165, 0.32)',
            'rgba(165, 180, 252, 0.32)',
        ];

        const MAX = 3;

        function formatCount(n) {
            if (!n || n === 0) return "—";
            if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
            if (n >= 1000)    return (n / 1000).toFixed(1)    + "K";
            return n.toString();
        }

        function addJoin(name, avatar, followerCount, level) {
            const color = colors[Math.floor(Math.random() * colors.length)];

            const followersHtml = `
                <div class="followers-box">
                    <div class="followers-icon">👥</div>
                    <div class="followers-count">${formatCount(followerCount)}</div>
                    <div class="followers-label">متابع</div>
                </div>`;

            const levelHtml = level ? `
                <div class="level-box">
                    <span class="level-text">⭐ Lv.${level}</span>
                </div>` : "";

            const div = document.createElement("div");
            div.className = "join-notification";
            div.style.background = color;
            div.innerHTML = `
                <div class="join-right">
                    <img class="avatar" src="${avatar}" onerror="this.src='${fallbackAvatar}'">
                    <div class="join-info">
                        <div class="join-app-label">🔴 TikTok Live</div>
                        <div class="join-name">${name}</div>
                        <div class="join-action">انضم إلى البث ✨</div>
                    </div>
                </div>
                <div class="join-left">
                    ${followersHtml}
                    ${levelHtml}
                </div>`;

            joinContainer.prepend(div);

            if (joinContainer.children.length > MAX) {
                const last = joinContainer.lastChild;
                last.style.animation = "pushOut 0.35s ease forwards";
                setTimeout(() => { if (last.parentNode) last.remove(); }, 350);
            }
        }

        const ws = new WebSocket("ws://localhost:8080");

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "join") {
                    addJoin(
                        msg.data.name         || "متابع جديد",
                        msg.data.avatar       || fallbackAvatar,
                        msg.data.followerCount || 0,
                        msg.data.level        || null
                    );
                }
            } catch (e) {
                console.error("خطأ:", e);
            }
        };
    </script>
</body>
</html>
