<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            background-color: rgba(0, 0, 0, 0) !important;
            overflow: hidden;
            position: relative;
            font-family: sans-serif;
        }
        .stats-bar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #ffffff !important;
            background: rgba(0, 0, 0, 0.75) !important;
            padding: 10px 25px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 9999;
            opacity: 1 !important;
            visibility: visible !important;
        }
        #gift-banner-container {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 9999;
        }
        .gift-banner {
            background: linear-gradient(90deg, #ff0080 0%, #6b00ff 100%) !important;
            border: 3px solid #ffffff !important;
            border-radius: 50px;
            padding: 15px 40px;
            color: #ffffff !important;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            opacity: 1 !important;
        }
        .gift-banner img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        .gift-text h2 { font-size: 24px; color: #ffffff !important; }
        .gift-text p { font-size: 18px; color: #ffeb3b !important; font-weight: bold; }

        #chat-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 450px;
            height: 450px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            z-index: 9999;
        }
        .chat-msg {
            background: rgba(10, 10, 10, 0.85) !important;
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #ffffff !important;
            padding: 14px;
            border-radius: 16px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 1 !important;
            visibility: visible !important;
        }
        .chat-msg .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffbc00; }
        .chat-msg .badge { width: 22px; height: 22px; object-fit: contain; }
        .chat-msg .username { color: #ffbc00 !important; font-weight: bold; font-size: 18px; }
        .chat-msg .text { color: #ffffff !important; font-size: 18px; word-break: break-word; }

        #join-container {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 380px;
            height: 450px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            pointer-events: none;
            z-index: 9999;
        }
        .join-notification {
            background: rgba(20, 20, 20, 0.8) !important;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            border-radius: 20px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            opacity: 1 !important;
            visibility: visible !important;
        }
        .join-notification .avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #ffffff; }
        .join-notification .info { display: flex; flex-direction: column; }
        .join-notification .name { color: #ffffff !important; font-weight: bold; font-size: 16px; }
        .join-notification .action { color: #e0e0e0 !important; font-size: 14px; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div id="viewers-count">👤 0</div>
        <div id="likes-count">❤️ 0</div>
    </div>

    <div id="gift-banner-container"></div>
    <div id="chat-container"></div>
    <div id="join-container"></div>

    <script>
        const ws = new WebSocket("ws://localhost:8080");
        const chatContainer = document.getElementById("chat-container");
        const joinContainer = document.getElementById("join-container");
        const giftContainer = document.getElementById("gift-banner-container");

        ws.onopen = () => { console.log("HTML Webcast Connected to WebSocket Server Successfully."); };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.type === "viewerCount" && msg.data !== undefined) {
                document.getElementById("viewers-count").innerText = `👤 ${Number(msg.data).toLocaleString()}`;
            }
            if (msg.type === "like" && msg.data !== undefined) {
                document.getElementById("likes-count").innerText = `❤️ ${Number(msg.data).toLocaleString()}`;
            }
            
            if (msg.type === "comment" && msg.data) {
                console.log("HTML Received Comment:", msg.data.text);
                const msgDiv = document.createElement("div");
                msgDiv.className = "chat-msg";
                let badgesHtml = "";
                if (Array.isArray(msg.data.badges)) {
                    msg.data.badges.forEach(url => { badgesHtml += `<img class="badge" src="${url}">`; });
                }
                msgDiv.innerHTML = `
                    <img class="avatar" src="${msg.data.avatar || 'https://www.tiktok.com/favicon.ico'}">
                    <div class="msg-content">
                        <span class="username">${msg.data.name}</span>
                        ${badgesHtml}
                        <span class="text">: ${msg.data.text}</span>
                    </div>
                `;
                chatContainer.prepend(msgDiv);
                if (chatContainer.children.length > 15) { chatContainer.removeChild(chatContainer.lastChild); }
            }

            if (msg.type === "join" && msg.data) {
                console.log("HTML Received Join:", msg.data.name);
                const joinDiv = document.createElement("div");
                joinDiv.className = "join-notification";
                joinDiv.innerHTML = `
                    <img class="avatar" src="${msg.data.avatar || 'https://www.tiktok.com/favicon.ico'}">
                    <div class="info">
                        <span class="name">${msg.data.name}</span>
                        <span class="action">انضم إلى البث الآن ✨</span>
                    </div>
                `;
                joinContainer.prepend(joinDiv);
                setTimeout(() => { if (joinDiv.parentNode) { joinContainer.removeChild(joinDiv); } }, 6000);
            }

            if (msg.type === "gift" && msg.data) {
                console.log("HTML Received Gift:", msg.data.giftName);
                giftContainer.innerHTML = `
                    <div class="gift-banner">
                        <img src="${msg.data.avatar || 'https://www.tiktok.com/favicon.ico'}">
                        <div class="gift-text">
                            <h2>🤍 شكراً لك: ${msg.data.name}</h2>
                            <p>أرسل ${msg.data.giftName} x${msg.data.count}</p>
                        </div>
                    </div>
                `;
                setTimeout(() => { giftContainer.innerHTML = ""; }, 5000);
            }
        };
    </script>
</body>
</html>
