<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            background-color: rgba(0, 0, 0, 0) !important;
            overflow: hidden;
            position: relative;
        }

        /* شريط العدادات - أعلى اليمين */
        .stats-bar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stats-item { display: flex; align-items: center; gap: 8px; }

        /* بنر الهدايا - منتصف الشاشة من الأعلى */
        #gift-banner-container {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 550px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 999;
        }
        .gift-banner {
            background: linear-gradient(90deg, rgba(255, 0, 128, 0.95) 0%, rgba(107, 0, 255, 0.95) 100%);
            border: 2px solid #ffffff;
            border-radius: 50px;
            padding: 12px 35px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gift-banner img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fff; }
        .gift-text h2 { font-size: 22px; color: #fff; margin-bottom: 2px; }
        .gift-text p { font-size: 18px; color: #ffeb3b; font-weight: bold; }

        /* صندوق التعليقات - أسفل اليمين (مصلح ومعزز) */
        #chat-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 420px;
            height: 380px;
            display: flex;
            flex-direction: column; /* تم تعديله لإصلاح الترتيب */
            justify-content: flex-end;
            overflow: hidden;
        }
        .chat-msg {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 16px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.3s ease-out;
            max-width: 100%;
        }
        .chat-msg .avatar { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #ffbc00; }
        .chat-msg .msg-body { display: flex; flex-direction: column; flex: 1; }
        .chat-msg .username-container { display: flex; align-items: center; gap: 6px; }
        .chat-msg .username { color: #ffbc00; font-weight: bold; font-size: 15px; }
        .chat-msg .badge { height: 16px; object-fit: contain; }
        .chat-msg .text { color: #ffffff; font-size: 15px; margin-top: 2px; word-break: break-word; text-align: right; }

        /* صندوق الإشعارات (انضمام ومتابعة) - أسفل اليسار */
        #notification-container {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 380px;
            height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            pointer-events: none;
        }
        .join-notification {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 16px;
            border-radius: 20px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            animation: slideInLeft 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* تمييز إشعار المتابعة بلون متوهج خفيف */
        .join-notification.follow-type {
            border: 1px solid rgba(0, 255, 150, 0.4);
            background: rgba(15, 35, 25, 0.75);
        }
        .join-notification .avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.6); }
        .join-notification.follow-type .avatar { border-color: #00ff96; }
        .join-notification .info { display: flex; flex-direction: column; }
        .join-notification .name { color: #ffffff; font-weight: 600; font-size: 15px; }
        .join-notification .action { color: #e0e0e0; font-size: 13px; margin-top: 1px; }

        /* حركات الأنميشن */
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 0.9; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stats-item" id="viewers-count">👤 0</div>
        <div class="stats-item" id="likes-count">❤️ 0</div>
    </div>

    <div id="gift-banner-container"></div>
    <div id="chat-container"></div>
    <div id="notification-container"></div>

    <script>
        const ws = new WebSocket("ws://localhost:8080");
        const chatContainer = document.getElementById("chat-container");
        const notificationContainer = document.getElementById("notification-container");
        const giftContainer = document.getElementById("gift-banner-container");
        const fallbackAvatar = 'https://www.tiktok.com/favicon.ico';

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                
                if (msg.type === "viewerCount") {
                    document.getElementById("viewers-count").innerHTML = `👤 ${msg.data.toLocaleString()}`;
                }
                if (msg.type === "like") {
                    document.getElementById("likes-count").innerHTML = `❤️ ${msg.data.toLocaleString()}`;
                }
                
                // معالج التعليقات (مصلح بالكامل)
                if (msg.type === "comment") {
                    const msgDiv = document.createElement("div");
                    msgDiv.className = "chat-msg";
                    
                    let badgesHtml = "";
                    if (msg.data.badges && Array.isArray(msg.data.badges)) {
                        msg.data.badges.forEach(b => {
                            const url = b.url || b.image?.url;
                            if (url) badgesHtml += `<img class="badge" src="${url}">`;
                        });
                    }
                    
                    const userAvatar = msg.data.avatar || fallbackAvatar;
                    const userName = msg.data.name || "متابع";
                    const userText = msg.data.text || "";

                    msgDiv.innerHTML = `
                        <img class="avatar" src="${userAvatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="msg-body">
                            <div class="username-container">
                                <span class="username">${userName}</span>
                                ${badgesHtml}
                            </div>
                            <span class="text">${userText}</span>
                        </div>
                    `;
                    chatContainer.appendChild(msgDiv); // استخدام appendChild مع الـ column العادي
                    if (chatContainer.children.length > 6) { chatContainer.removeChild(chatContainer.firstChild); }
                }

                // معالج الانضمام والمتابعة الموحد
                if (msg.type === "join" || msg.type === "follow") {
                    const isFollow = msg.type === "follow";
                    const notifDiv = document.createElement("div");
                    notifDiv.className = `join-notification ${isFollow ? 'follow-type' : ''}`;
                    
                    const avatar = msg.data.avatar || fallbackAvatar;
                    const name = msg.data.name || "متابع";
                    const actionText = isFollow ? "قام بمتابعة البث الآن 💖" : "انضم إلى البث الآن ✨";

                    notifDiv.innerHTML = `
                        <img class="avatar" src="${avatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="info">
                            <span class="name">${name}</span>
                            <span class="action">${actionText}</span>
                        </div>
                    `;
                    notificationContainer.appendChild(notifDiv);
                    if (notificationContainer.children.length > 5) { notificationContainer.removeChild(notificationContainer.firstChild); }
                    
                    setTimeout(() => { 
                        notifDiv.style.opacity = '0';
                        notifDiv.style.transition = 'all 0.4s ease';
                        setTimeout(() => { if (notifDiv.parentNode) { notificationContainer.removeChild(notifDiv); } }, 400);
                    }, 4000);
                }

                // معالج الهدايا
                if (msg.type === "gift") {
                    const giftAvatar = msg.data.avatar || fallbackAvatar;
                    const giftName = msg.data.name || "داعم كريم";
                    
                    giftContainer.innerHTML = `
                        <div class="gift-banner">
                            <img src="${giftAvatar}" onerror="this.src='${fallbackAvatar}'">
                            <div class="gift-text">
                                <h2>🤍 شكراً لك: ${giftName}</h2>
                                <p>أرسل ${msg.data.giftName} x${msg.data.count}</p>
                            </div>
                        </div>
                    `;
                    setTimeout(() => { giftContainer.innerHTML = ""; }, 5000);
                }
            } catch (e) {
                console.error("خطأ في معالجة حزمة البيانات:", e);
            }
        };
    </script>
</body>
</html>
