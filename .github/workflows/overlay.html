<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay Premium</title>
     <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@500;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            overflow: hidden;
            position: relative;
            font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
           -webkit-font-smoothing: antialiased;
        }

        /* ── 1. الساعة المصغرة بدون ثواني (فوق يسار) ── */
        .clock-box {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 100;
            will-change: transform, opacity;
        }
        .clock-time {
            font-size: 21px; /* تصغير الخط */
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            direction: ltr;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1) !important;
            transform: translate3d(0, 0, 0); 
            will-change: transform, opacity;
        }
        .clock-label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 1px;
        }

        
        /* ── شريط الإحصائيات (فوق يمين) ── */
        .stats-bar {
           position: absolute;
           top: 25px;
           right: 25px;
           display: flex;
           gap: 20px;
           font-size: 21px;
           font-weight: 700;
           color: #ffffff;
           letter-spacing: 0.5px;
           background: rgba(0, 0, 0, 0.55);
           backdrop-filter: blur(15px);
           -webkit-backdrop-filter: blur(15px);
           padding: 10px 25px;
           border-radius: 16px;
           border: 1px solid rgba(255, 255, 255, 0.12);
           z-index: 100;
           will-change: transform, opacity;
       }

        /* ── بنر الهدايا الذكي والمطور ── */
  #gift-banner-container {
    position: absolute;
    top: 160px;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: max-content; 
    max-width: 90%; 
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    z-index: 900;
}


.gift-banner {
    background: rgba(30, 20, 50, 0.92); 
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 2px solid #ffbc00; 
    border-radius: 24px; 
    padding: 18px 32px; 
    color: white;
    display: flex;
    align-items: center;
    gap: 24px; 
    box-shadow: 0 15px 50px rgba(255, 188, 0, 0.25), 0 0 25px rgba(255, 188, 0, 0.15);
    animation: bounceIn 0.05s linear forwards;
    will-change: transform, opacity;
    min-width: 420px; 
}

/* صورة المرسل (صغيرة وجانبية لكي لا تسرق الأضواء) */
.gift-banner img:first-of-type {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.6);
    flex-shrink: 0;
    animation: none !important;
    transform: scale(1) !important;
}

/* 👑 صورة الهدية - مساحة حرة كاملة بدون دائرة وبدون أي اقتطاع للأطراف */
.gift-banner .gift-img, 
.gift-banner img:last-of-type {
    width: 85px !important; 
    height: 85px !important;
    object-fit: contain !important; /* 🌟 تضمن ظهور الهدية كاملة بنسبها الأصلية دون تمطيط */
    border-radius: 0% !important;  /* 🚫 ألغينا الدائرة تماماً لتبق حدودها حرة */
    border: none !important;        /* 🚫 حذفنا أي إطار قد يقيد شكل الهدية */
    flex-shrink: 0;
    filter: drop-shadow(0 0 15px #ffbc00); 
    animation: none !important;
    transform: scale(1) !important;
    margin-left: auto; 
}

.gift-text h2 {
    font-size: 22px; 
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    margin: 0;
}

.gift-text p {
    font-size: 17px; 
    color: #ffff00; 
    font-weight: 700;
    margin-top: 4px;
    margin-bottom: 0;
    display: inline-block;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
}

/* 🔥 عداد التكرار والـ X - وضوح خارق وحجم ضخم ينبض بحماس */
.count-pop {
    animation: popScale 0.15s ease-out;
    color: #ffffff !important;
    background: linear-gradient(135deg, #ff0055, #ff00aa); 
    padding: 6px 16px; 
    border-radius: 14px; 
    font-size: 28px; 
    font-weight: 900; 
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
    box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
    display: inline-block;
    margin-left: 10px;
    font-family: Arial, sans-serif; 
}


            /* ─── بنر المتابعة الذكي والمطور (نسخة السنتر والأفاتار اليميني) ─── */
#follow-banner-container {
    position: absolute;
    bottom: 90px;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: 540px;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 200;
}

.follow-banner {
    background: rgba(20, 15, 30, 0.75); /* خلفية ملكية زجاجية شفافة */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50px;
    padding: 10px 20px;
    display: flex;
    flex-direction: row-reverse; /* أجبرنا العناصر على الترتيب من اليمين لليسار بشكل طبيعي */
    align-items: center;
    justify-content: center; /* إلغاء space-between وتجميع العناصر بالمنتصف لمنع انحراف اليسار */
    gap: 20px; /* مسافة ثابتة وموزونة بين الأفاتار والنصوص */
    width: auto; /* يجعل حجم البنر مرناً وملموماً على حسب محتواه بدلاً من التمدد العشوائي */
    min-width: 320px;
    box-sizing: border-box;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    animation: slideUp 0.05s linear forwards !important;
    will-change: transform, opacity;
}

/* القسم الأيمن (صار يميناً الآن): يحتوي على الصورة والاسم بجانبها */
.follow-left-part {
    display: flex;
    flex-direction: row-reverse; /* وضع الصورة يمين الاسم مباشرة */
    align-items: center;
    gap: 12px;
}

/* حاوية النصوص */
.follow-text-group {
    display: flex;
    flex-direction: column;
    align-items: flex-end; /* محاذاة النصوص لليمين لتناسب اللغة العربية */
}

.follow-label {
    font-size: 11px;
    font-weight: 800;
    color: #ffbc00; /* الذهبي المعتمد */
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
}

.follow-name {
    font-size: 20px;
    color: #ffffff;
    font-weight: 700;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
}

/* القسم الأيسر (صار يساراً الآن): العداد */
.follow-right-part {
    display: flex;
    align-items: center;
}

.follow-count-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.08);
    padding: 6px 14px;
    border-radius: 20px;
}

.follow-count-icon {
    font-size: 16px;
    color: #00ffff; /* السماوي الرقمي */
}

.follow-count {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.9);
    font-weight: 600;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
}

.follow-avatar-box {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
}

.follow-banner img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid #ffbc00; /* إطار ذهبي رفيع */
    object-fit: cover;
        }
    

        .follow-banner img { width: 56px; height: 56px; border-radius: 50%; border: 2px solid rgba(157, 93, 255, 0.7); flex-shrink: 0; }
        .follow-info { flex: 1; }
        .follow-label { font-size: 12px; font-weight: 700; color: rgba(180, 130, 255, 0.9); letter-spacing: 1.5px; text-transform: uppercase; }
        .follow-name { font-size: 24px; color: #ffffff; font-weight: 700; margin-top: 2px; }
        .follow-count { font-size: 16px; color: rgba(255, 255, 255, 0.8); margin-top: 3px; font-weight: 600; }
        .follow-icon { font-size: 34px; flex-shrink: 0; }

        /* ── 2. صندوق التعليقات المحسّن (قصير + تأثير التلاشي التدرجي للذكاء البصري iOS) ── */
        #chat-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 440px;
            height: 600px; /* تقصير الصندوق لحمايته من التمدد للأعلى */
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            z-index: 50;
            /* سر صناعة قناع التلاشي التدريجي الـ iOS الخيالي */
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 65%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 65%, rgba(0,0,0,0) 100%);
        }
        
                /* تطابق كامل ومثالي مع حواف كروت الانضمام ونظام الـ iOS الرفيع */
        .chat-msg {
            background: rgba(12, 12, 18, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); /* خط الحافة الرفيع الحاد والممتاز */
            color: #ffffff;
            padding: 6px 12px; /* 🛠️ تم تقليل التباعد الداخلي لإعطاء مساحة أكبر للنص */
            border-radius: 14px; /* 🛠️ حواف أنعم تتناسب مع الحجم الجديد */
            margin-top: 8px;
            display: flex;
            align-items: flex-start; /* 🛠️ السماح للصندوق بالتمدد لأسفل مع الأسطر الكثيرة */
            gap: 10px;
            /* استخدام نفس نظام أنيميشن الـ الانضمام الناعم والمريح للعين */
            animation: slideInRight 0.05s linear forwards;
         }
        #chat-container .chat-msg:nth-child(1) { opacity: 1; }
        #chat-container .chat-msg:nth-child(2) { opacity: 0.75; }
        #chat-container .chat-msg:nth-child(3) { opacity: 0.5; }
        #chat-container .chat-msg:nth-child(n+4) { opacity: 0.25; }
        
        .chat-msg .avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255, 188, 0, 0.6); flex-shrink: 0; }
        .chat-msg .badge  { width: 18px; height: 18px; object-fit: contain; vertical-align: middle; margin-left: 4px; }
        .chat-msg .msg-content { flex-grow: 1; min-width: 0; line-height: 1.4; }

         /* ── تطبيق خطوط النظام الذكية المدمجة ── */
    .chat-msg .username { 
    color: #ffbc00; 
    font-weight: 700; 
    font-size: 16px; 
    display: inline; 
    font-family: 'IBM Plex Sans Arabic', sans-serif; /* 🍏 خط أبل المتناسق */
} 
    .chat-msg .text { 
    color: rgba(255, 255, 255, 0.95); 
    font-size: 18px; 
    word-break: break-word; 
    font-weight: 600; 
    display: inline; 
    margin-right: 6px; 
    font-family: 'IBM Plex Sans Arabic', sans-serif; /* 🍏 خط أبل المتناسق */
}



        /* ── صندوق الانضمامات المستقر ── */
        #join-container {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 360px;
            height: 350px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            pointer-events: none;
            z-index: 50;
        }
        .join-notification {
            background: rgba(20, 20, 30, 0.60);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 13px 16px;
            border-radius: 18px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 13px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
            animation: slideInLeft 0.05s linear forwards, fadeOut 0.05s linear 5.5s forwards;

        }
        .join-notification .avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.4); }
        .join-notification .name   { color: #ffffff; font-weight: 700; font-size: 16px; }
        .join-notification .action { color: rgba(255, 255, 255, 0.55); font-size: 13px; margin-top: 2px; font-weight: 600; }

    
        @keyframes slideInLeft  { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes slideInRight { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes slideUp      { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes bounceIn     { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes fadeOut      { from { opacity: 1; } to { opacity: 0; } }
        @keyframes popScale     { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #fff; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="clock-box">
        <div class="clock-time" id="clock-time">00:00</div>
        <div class="clock-label"> مكة المكرمة </div>
    </div>

    <div class="stats-bar">
        <div id="viewers-count">👤 0</div>
        <div id="likes-count">❤️ 0</div>
    </div>

    <div id="gift-banner-container"></div>
    <div id="follow-banner-container"></div>
    <div id="chat-container"></div>
    <div id="join-container"></div>

    <script>
        // تحديث الساعة بدون ثواني
        function updateClock() {
            const now = new Date();
            const ksa = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" }));
            const h = String(ksa.getHours()).padStart(2, '0');
            const m = String(ksa.getMinutes()).padStart(2, '0');
            document.getElementById("clock-time").textContent = `${h}:${m}`;
        }
        updateClock();
        setInterval(updateClock, 10000); // تحديث هادئ كل 10 ثوانٍ لعدم إجهاد الصفحة

        const ws = new WebSocket("ws://localhost:8080");
        const chatContainer   = document.getElementById("chat-container");
        const joinContainer   = document.getElementById("join-container");
        const giftContainer   = document.getElementById("gift-banner-container");
        const followContainer = document.getElementById("follow-banner-container");
        const fallbackAvatar  = 'https://www.tiktok.com/favicon.ico';

        // متغيرات ذكية لحفظ الذاكرة اللحظية للبث ومنع التكرار البصري
        let currentGiftUser  = null;
        let currentGiftName  = null;
        let currentGiftCount = 0;
        let giftTimer        = null;

        let currentFollowUser = null;
        let followTimer       = null;

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);

                if (msg.type === "viewerCount") {
                    document.getElementById("viewers-count").innerText = `👤 ${msg.data.toLocaleString()}`;
                }

                if (msg.type === "like") {
                    document.getElementById("likes-count").innerText = `❤️ ${msg.data.toLocaleString()}`;
                }

                if (msg.type === "comment") {
                    const msgDiv = document.createElement("div");
                    msgDiv.className = "chat-msg";
                    let badgesHtml = "";
                    if (msg.data.badges && Array.isArray(msg.data.badges)) {
                    msg.data.badges.forEach(b => {
                    const url = b.url || b.image?.url;
                    if (url) badgesHtml += `<img class="badge" src="${url}">`;
                        });
                }
                    const userAvatar = msg.data.avatar || fallbackAvatar;
                     msgDiv.innerHTML = `
                        <img class="avatar" src="${userAvatar}" onerror="this.src='${fallbackAvatar}'" style="margin-top: 2px;">
                        <div class="msg-content">
                            ${badgesHtml}
                            <span class="username">${msg.data.name || "متابع"}: </span>
                            <span class="text">${msg.data.text || ""}</span>
                        </div>`;

                    chatContainer.prepend(msgDiv);
                    if (chatContainer.children.length > 15) chatContainer.removeChild(chatContainer.lastChild);
                }

                if (msg.type === "join") {
                    const joinDiv = document.createElement("div");
                    joinDiv.className = "join-notification";
                    const joinAvatar = msg.data.avatar || fallbackAvatar;
                    joinDiv.innerHTML = `
                        <img class="avatar" src="${joinAvatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="info">
                            <div class="name">${msg.data.name || "متابع جديد"}</div>
                            <div class="action">انضم إلى البث الآن ✨</div>
                        </div>`;
                    joinContainer.prepend(joinDiv);
                    setTimeout(() => { if (joinDiv.parentNode) joinContainer.removeChild(joinDiv); }, 7000);
                }

                // ── منطق المتابعة الذكي المتتالي ──
                if (msg.type === "follow") {
                    const name   = msg.data.name || "متابع جديد";
                    const avatar = msg.data.avatar || fallbackAvatar;
                    const count  = msg.data.followerCount ? Number(msg.data.followerCount).toLocaleString() : "";

                    clearTimeout(followTimer);
                    currentFollowUser = name;

                   followContainer.innerHTML = `
        <div id="follow-banner-container">
            <div class="follow-banner">
                <div class="follow-left-part">
                    <div class="follow-avatar-box">
                        <img id="follow-avatar" src="${avatar}" alt="avatar">
                    </div>
                    <div class="follow-text-group">
                        <span class="follow-label">Follow 👤</span>
                        <div class="follow-name" id="follow-name">${name}</div>
                    </div>
                </div>
                
                <div class="follow-right-part">
                    <div class="follow-count-box">
                        <span class="follow-count-icon">👥</span>
                        <span class="follow-count" id="follow-count">${count || '0'}</span>
                    </div>
                </div>
            </div>
        </div>
        `;

                    followTimer = setTimeout(() => {
                        followContainer.innerHTML = "";
                        currentFollowUser = null;
                    }, 7000);
                }
                                // ── كود معالجة الهدايا المطور مع جلب وعرض الأيقونة الرسمية فخمة ──
                if (msg.type === "gift") {
                    const name     = msg.data.name || "داعم كريم";
                    const giftName = msg.data.giftName;
                    const avatar   = msg.data.avatar || fallbackAvatar;
                    const newCount = msg.data.count || 1;
                    const giftIcon = msg.data.giftIcon || ""; // الرابط المؤمن القادم من السيرفر

                    if (currentGiftUser === name && currentGiftName === giftName) {
                        currentGiftCount += newCount;
                        clearTimeout(giftTimer);
                        
                        const countEl = document.getElementById("gift-counter-hit");
                        if (countEl) {
                            countEl.innerText = `${giftName} × ${currentGiftCount}`;
                            countEl.classList.remove("count-pop");
                            void countEl.offsetWidth; 
                            countEl.classList.add("count-pop");
                        }
                    } else {
                        currentGiftUser  = name;
                        currentGiftName  = giftName;
                        currentGiftCount = newCount;
                        clearTimeout(giftTimer);

                        // تجهيز أيقونة الهدية بتأثير نبض مبهج ومنفصل في اليسار
                        const giftImgHtml = giftIcon ? `<img src="${giftIcon}" class="gift-icon-neon" style="width: 45px; height: 45px; object-fit: contain; animation: popScale 0.4s infinite alternate; filter: drop-shadow(0 0 8px rgba(255,188,0,0.5));">` : "";

                        giftContainer.innerHTML = `
                            <div class="gift-banner" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                                <div style="display: flex; align-items: center; gap: 14px;">
                                    <img src="${avatar}" onerror="this.src='${fallbackAvatar}'" style="width: 48px; height: 48px; border-radius: 50%; border: 2px solid #ffbc00; flex-shrink: 0;">
                                    <div class="gift-text">
                                        <h2 style="font-size: 16px; font-weight: 700; color: #fff; margin: 0; font-family: 'IBM Plex Sans Arabic', sans-serif;"> 🤍 شكراً: ${name}</h2>
                                        <p id="gift-counter-hit" class="count-pop" style="margin-top: 4px; font-family: 'IBM Plex Sans Arabic', sans-serif;">${giftName} × ${currentGiftCount}</p>
                                    </div>
                                </div>
                                <div style="margin-right: auto; padding-right: 5px; display: flex; align-items: center;">
                                    ${giftImgHtml} </div>
                            </div>`;
                    }

                    giftTimer = setTimeout(() => {
                        giftContainer.innerHTML = "";
                        currentGiftUser  = null;
                        currentGiftName  = null;
                        currentGiftCount = 0;
                    }, 7000);
                }
            } catch (e) {
                console.error("خطأ في التحليل:", e);
            }
        };
    </script>
</body>
    </html>
