<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>قالب البث المباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --gold-dark: #8B6914;
    --purple-dark: #1a0a2e;
    --purple-mid: #2d1155;
    --white: #ffffff;
    --white-soft: rgba(255,255,255,0.85);
  }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    position: relative;
    font-family: 'Amiri', serif;
    background: var(--purple-dark);
  }

  /* ========== طبقة الخلفية ========== */
  #background-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* صورة الخلفية — غير المسار هنا */
  #background-layer img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* تدرج أسفل الصورة للاندماج مع الخلفية */
  #background-fade {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      transparent 40%,
      var(--purple-dark) 75%,
      var(--purple-dark) 100%
    );
    z-index: 2;
  }

  /* ========== المحتوى العلوي ========== */
  /* منطقة فاضية للأيقونات العلوية لـ TikTok */
  #top-spacer {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 120px;
    z-index: 10;
  }

  /* ========== منطقة الساعة والتاريخ ========== */
  #clock-section {
    position: absolute;
    top: 760px;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
    padding: 0 60px;
  }

  /* الساعة الرئيسية */
  #clock-display {
    font-family: 'Cairo', sans-serif;
    font-size: 96px;
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.5);
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 12px;
  }

  /* خط فاصل ذهبي */
  .divider {
    width: 200px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  /* منطقة التواريخ المتقلبة */
  #dates-container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 8px;
  }

  .date-block {
    text-align: center;
  }

  .date-label {
    font-family: 'Cairo', sans-serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--gold);
    margin-bottom: 4px;
    opacity: 0.8;
  }

  .date-value {
    font-family: 'Amiri', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--white-soft);
  }

  /* ========== منطقة النص المتغير ========== */
  #text-section {
    position: absolute;
    top: 1020px;
    left: 0; right: 0;
    padding: 0 80px;
    z-index: 10;
    text-align: center;
  }

  /* النص الرئيسي — آية أو رسالة */
  #main-text {
    font-family: 'Amiri', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.8;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    min-height: 120px;
    /* عدّل هذا النص من ملف text.txt */
  }

  /* نص ثانوي */
  #sub-text {
    font-family: 'Cairo', sans-serif;
    font-size: 34px;
    font-weight: 400;
    color: var(--gold);
    margin-top: 20px;
    opacity: 0.9;
    min-height: 50px;
  }

  /* ========== منطقة حرة للتخصيص ========== */
  /*
    هذه المنطقة فاضية — أضف فيها ما تريد:
    صورة، نص إضافي، شعار القناة، إلخ
  */
  #custom-zone {
    position: absolute;
    top: 1280px;
    left: 80px; right: 80px;
    height: 300px;
    z-index: 10;

    /* احذف التعليق أدناه لتفعيل المنطقة */
    /* border: 2px dashed rgba(201,168,76,0.3); */
    /* border-radius: 20px; */

    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* مثال — شعار القناة في المنطقة الحرة */
  #channel-name {
    font-family: 'Amiri', serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
    /* عدّل هذا النص */
  }

  /* ========== منطقة فاضية للتعليقات والهدايا ========== */
  /* TikTok يضع التعليقات والهدايا هنا تلقائياً */
  #bottom-spacer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 320px;
    z-index: 10;
  }

  /* ========== تأثير وميض خفيف على الخطوط الذهبية ========== */
  @keyframes gold-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  #clock-display {
    animation: gold-pulse 4s ease-in-out infinite;
  }

  /* ========== تأثير ظهور النص المتغير ========== */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .text-update {
    animation: fadeIn 0.5s ease-out;
  }

</style>
</head>
<body>

  <!-- طبقة الخلفية — غير اسم الملف -->
  <div id="background-layer">
    <img src="background.jpg" alt="خلفية">
  </div>
  <div id="background-fade"></div>

  <!-- مساحة أيقونات TikTok العلوية -->
  <div id="top-spacer"></div>

  <!-- قسم الساعة والتاريخ -->
  <div id="clock-section">
    <div id="clock-display">00:00:00</div>
    <div class="divider"></div>
    <div id="dates-container">
      <div class="date-block">
        <div class="date-label">مكة المكرمة</div>
        <div class="date-value" id="mecca-date">—</div>
      </div>
      <div class="date-block">
        <div class="date-label">القاهرة</div>
        <div class="date-value" id="cairo-date">—</div>
      </div>
    </div>
    <div class="divider"></div>
    <!-- التاريخ الهجري والميلادي المتقلب -->
    <div id="hijri-date" style="
      font-family: 'Amiri', serif;
      font-size: 42px;
      color: var(--white-soft);
      margin-top: 8px;
      min-height: 56px;
    ">—</div>
  </div>

  <!-- قسم النصوص المتغيرة -->
  <div id="text-section">
    <div id="main-text">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    <div id="sub-text">أهلاً بكم في بث القرآن الكريم</div>
  </div>

  <!-- المنطقة الحرة للتخصيص -->
  <div id="custom-zone">
    <div id="channel-name">✦ بث القرآن الكريم ✦</div>
  </div>

  <!-- مساحة TikTok السفلية -->
  <div id="bottom-spacer"></div>

<script>
  // ========== الساعة الحية ==========
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock-display').textContent = `${h}:${m}:${s}`;
  }

  // ========== توقيت مكة والقاهرة ==========
  function updateCityTimes() {
    const meccaTime = new Date().toLocaleTimeString('ar-SA', {
      timeZone: 'Asia/Riyadh',
      hour: '2-digit',
      minute: '2-digit'
    });
    const cairoTime = new Date().toLocaleTimeString('ar-EG', {
      timeZone: 'Africa/Cairo',
      hour: '2-digit',
      minute: '2-digit'
    });
    document.getElementById('mecca-date').textContent = meccaTime;
    document.getElementById('cairo-date').textContent = cairoTime;
  }

  // ========== التاريخ الهجري والميلادي المتقلب ==========
  let showHijri = true;

  function getHijriDate() {
    return new Date().toLocaleDateString('ar-SA-u-ca-islamic', {
      timeZone: 'Asia/Riyadh',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
  }

  function getMiladiDate() {
    return new Date().toLocaleDateString('ar', {
      timeZone: 'Asia/Riyadh',
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
  }

  function toggleDate() {
    const el = document.getElementById('hijri-date');
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.5s';
    setTimeout(() => {
      el.textContent = showHijri ? getHijriDate() : getMiladiDate();
      el.style.opacity = '1';
      showHijri = !showHijri;
    }, 500);
  }

  // ========== النص المتغير من Google Drive ==========
  // ضع هنا ID ملف text.txt من Google Drive
  const TEXT_FILE_ID = 'ضع_ID_الملف_هنا';

  async function updateText() {
    try {
      const url = `https://drive.google.com/uc?export=download&id=${TEXT_FILE_ID}&t=${Date.now()}`;
      const res = await fetch(url);
      const text = await res.text();
      const lines = text.split('\n');
      lines.forEach(line => {
        const [key, ...rest] = line.split('=');
        const value = rest.join('=').trim();
        const el = document.getElementById(key.trim());
        if (el && value) {
          el.textContent = value;
          el.classList.remove('text-update');
          void el.offsetWidth;
          el.classList.add('text-update');
        }
      });
    } catch (e) {
      // لو فشل التحميل يبقى النص الحالي
    }
  }

  // ========== تشغيل كل شيء ==========
  setInterval(updateClock, 1000);
  setInterval(updateCityTimes, 30000);
  setInterval(toggleDate, 8000);
  setInterval(updateText, 60000);

  // تشغيل فوري
  updateClock();
  updateCityTimes();
  toggleDate();
  updateText();
</script>
</body>
  </html>
