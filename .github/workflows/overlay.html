<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            overflow: hidden;
            position: relative;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* الحاوية — عمود عمودي يملأ الشاشة كاملاً */
        #join-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 1280px;
            height: 720px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 14px;
            padding: 16px 20px;
            overflow: hidden;
            pointer-events: none;
            z-index: 50;
        }

        /* كل كرت — شريط أفقي كامل العرض */
        .join-notification {
            width: 100%;
            height: 158px;           /* 720 ÷ 4 = 180 ناقص الـ gap والـ padding */
            border-radius: 22px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
            animation: slideInCard 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            flex-shrink: 0;
        }

        .join-notification .avatar {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }

        .join-notification .info {
            flex: 1;
            min-width: 0;
        }

        .join-notification .app-label {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .join-notification .name {
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 6px rgba(0,0,0,0.4);
            line-height: 1.1;
        }

        .join-notification .action {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            margin-top: 6px;
        }

        @keyframes slideInCard {
            0%   { opacity: 0; transform: translateY(-30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pushOut {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.96) translateY(10px); }
        }
    </style>
</head>
<body>
    <div id="join-container"></div>

    <script>
        const joinContainer = document.getElementById("join-container");
        const fallbackAvatar = 'https://www.tiktok.com/favicon.ico';

        const colors = [
            'rgba(59,  130, 246, 0.38)',
            'rgba(168,  85, 247, 0.38)',
            'rgba(236,  72, 153, 0.38)',
            'rgba( 20, 184, 166, 0.38)',
            'rgba(245, 158,  11, 0.38)',
            'rgba( 34, 197,  94, 0.38)',
            'rgba(239,  68,  68, 0.38)',
            'rgba( 99, 102, 241, 0.38)',
        ];

        const MAX = 4; // 4 أشرطة فقط تملأ الشاشة

        function addJoin(name, avatar) {
            const color = colors[Math.floor(Math.random() * colors.length)];

            const div = document.createElement("div");
            div.className = "join-notification";
            div.style.background = color;
            div.innerHTML = `
                <img class="avatar" src="${avatar}" onerror="this.src='${fallbackAvatar}'">
                <div class="info">
                    <div class="app-label">🔴 TikTok Live</div>
                    <div class="name">${name}</div>
                    <div class="action">انضم إلى البث ✨</div>
                </div>`;

            joinContainer.prepend(div);

            // لو تجاوز 4 — أخرج الأخير
            if (joinContainer.children.length > MAX) {
                const last = joinContainer.lastChild;
                last.style.animation = "pushOut 0.35s ease forwards";
                setTimeout(() => { if (last.parentNode) last.remove(); }, 350);
            }
        }

        const ws = new WebSocket("ws://localhost:8080");

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "join") {
                    addJoin(
                        msg.data.name   || "متابع جديد",
                        msg.data.avatar || fallbackAvatar
                    );
                }
            } catch (e) {
                console.error("خطأ:", e);
            }
        };
    </script>
</body>
</html>
