<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 1280px;
            height: 720px;
            background: transparent !important;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── الساعة الذكية (زاوية فوق يسار) بتوقيت مكة ── */
        .clock-box {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(12, 12, 18, 0.45); /* زيادة الشفافية */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 12px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }
        .clock-time {
            font-size: 30px; /* تكبير درجة الخط */
            font-weight: 800; /* خط أوضح وأثقل */
            color: #ffffff;
            letter-spacing: 1.5px;
            direction: ltr;
        }
        .clock-label {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        /* ── شريط الإحصائيات (فوق يمين) ── */
        .stats-bar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 24px;
            font-size: 24px; /* تكبير الخط */
            font-weight: 700;
            color: #ffffff;
            background: rgba(12, 12, 18, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 28px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        /* ── بنر الهدايا (تهدئة السرعة بالكامل) ── */
        #gift-banner-container {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 650px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 90;
        }
        .gift-banner {
            background: linear-gradient(135deg, rgba(190, 0, 110, 0.85) 0%, rgba(95, 0, 210, 0.85) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 18px 40px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            /* أنيميشن ناعم وبطيء للدخول والخروج بسلاسة عالية */
            animation: smoothBounceIn 0.8s cubic-bezier(0.25, 1, 0.5, 1), fadeOut 0.6s ease-out 5.4s forwards;
        }
        .gift-banner img { 
            width: 58px; height: 58px; 
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.5); 
        }
        .gift-text h2 { font-size: 25px; font-weight: 700; color: #fff; }
        .gift-text p  { font-size: 19px; color: #ffeb3b; font-weight: 700; margin-top: 4px; }

        /* ── بنر المتابعة المطور (فوق الكل + شفاف ونعومة قصوى) ── */
        #follow-banner-container {
            position: absolute;
            bottom: 140px; /* رفعه قليلاً للأعلى لتفادي كروت الدخول */
            left: 50%;
            transform: translateX(-50%);
            width: 58px0px;
            pointer-events: none;
            z-index: 200; /* أعلى قيمة ليكون فوق كل الكروت والإشعارات */
        }
        .follow-banner {
            background: rgba(10, 8, 25, 0.60); /* زيادة الشفافية */
            backdrop-filter: blur(25px); /* تعميق البلور الزجاجي */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(157, 93, 255, 0.4);
            border-radius: 24px;
            padding: 18px 26px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 50px rgba(157, 93, 255, 0.2), 0 15px 45px rgba(0, 0, 0, 0.5);
            /* تهدئة أنيميشن الصعود وجعله انسيابياً وبطيئاً */
            animation: smoothSlideUp 0.8s cubic-bezier(0.25, 1, 0.5, 1), fadeOut 0.6s ease-out 5.4s forwards;
        }
        .follow-banner img {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(157, 93, 255, 0.8);
            flex-shrink: 0;
        }
        .follow-info { flex: 1; }
        .follow-label {
            font-size: 13px;
            font-weight: 800;
            color: rgba(187, 140, 255, 1);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .follow-name {
            font-size: 25px; /* تكبير اسم المتابع */
            color: #ffffff;
            font-weight: 700;
            margin-top: 3px;
        }
        .follow-count {
            font-size: 18px; /* تكبير حجم عداد المتابعين ليظهر بوضوح عالي */
            color: rgba(255, 255, 255, 0.8); /* توضيح اللون */
            margin-top: 4px;
            font-weight: 700;
        }
        .follow-icon { font-size: 38px; flex-shrink: 0; }

        /* ── صندوق التعليقات ── */
        #chat-container {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 440px;
            height: 440px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            z-index: 50;
        }
        .chat-msg {
            background: rgba(12, 12, 18, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 16px;
            margin-top: 10px; /* زيادة التباعد الرأسي بين الكروت لنعومة الصعود */
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: smoothSlideInRight 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .chat-msg .avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid rgba(255, 188, 0, 0.7); flex-shrink: 0; }
        .chat-msg .badge  { width: 22px; height: 22px; object-fit: contain; vertical-align: middle; margin-right: 4px; }
        .chat-msg .username { color: #ffbc00; font-weight: 700; font-size: 18px; display: inline-flex; align-items: center; gap: 4px; }
        .chat-msg .text { color: rgba(255, 255, 255, 0.95); font-size: 17px; word-break: break-word; margin-top: 4px; line-height: 1.4; font-weight: 600; }

        /* ── صندوق الانضمامات ── */
        #join-container {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 380px;
            height: 440px;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            pointer-events: none;
            z-index: 50;
        }
        .join-notification {
            background: rgba(20, 20, 30, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 18px;
            border-radius: 18px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
            animation: smoothSlideInLeft 0.5s cubic-bezier(0.25, 1, 0.5, 1), fadeOut 0.5s ease-out 4.5s forwards;
        }
        .join-notification .avatar { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255, 255, 255, 0.4); }
        .join-notification .name   { color: #ffffff; font-weight: 700; font-size: 17px; }
        .join-notification .action { color: rgba(255, 255, 255, 0.6); font-size: 13px; margin-top: 2px; font-weight: 600; }

        /* ── تحسين وتخفيف سرعة الـ Animations (تهدئة الأنيميشن) ── */
        @keyframes smoothSlideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes smoothSlideInLeft  { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes smoothSlideUp      { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes smoothBounceIn     { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeOut            { from { opacity: 1; } to { opacity: 0; max-height: 0; padding: 0; margin: 0; border: none; } }
    </style>
</head>
<body>

    <div class="clock-box">
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-label">مكة المكرمة · KSA</div>
    </div>

    <div class="stats-bar">
        <div id="viewers-count">👤 0</div>
        <div id="likes-count">❤️ 0</div>
    </div>

    <div id="gift-banner-container"></div>
    <div id="follow-banner-container"></div>
    <div id="chat-container"></div>
    <div id="join-container"></div>

    <script>
        // ── تحديث توقيت مكة المكرمة بدقة ──
        function updateClock() {
            const now = new Date();
            const ksa = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Riyadh" }));
            const h = String(ksa.getHours()).padStart(2, '0');
            const m = String(ksa.getMinutes()).padStart(2, '0');
            const s = String(ksa.getSeconds()).padStart(2, '0');
            document.getElementById("clock-time").textContent = `${h}:${m}:${s}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ── الاتصال وسحب البيانات الحية ──
        const ws = new WebSocket("ws://localhost:8080");
        const chatContainer   = document.getElementById("chat-container");
        const joinContainer   = document.getElementById("join-container");
        const giftContainer   = document.getElementById("gift-banner-container");
        const followContainer = document.getElementById("follow-banner-container");
        const fallbackAvatar  = 'https://www.tiktok.com/favicon.ico';

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);

                if (msg.type === "viewerCount") {
                    document.getElementById("viewers-count").innerText = `👤 ${msg.data.toLocaleString()}`;
                }

                if (msg.type === "like") {
                    document.getElementById("likes-count").innerText = `❤️ ${msg.data.toLocaleString()}`;
                }

                if (msg.type === "comment") {
                    const msgDiv = document.createElement("div");
                    msgDiv.className = "chat-msg";
                    let badgesHtml = "";
                    if (msg.data.badges && Array.isArray(msg.data.badges)) {
                        msg.data.badges.forEach(b => {
                            const url = b.url || b.image?.url;
                            if (url) badgesHtml += `<img class="badge" src="${url}">`;
                        });
                    }
                    const userAvatar = msg.data.avatar || fallbackAvatar;
                    msgDiv.innerHTML = `
                        <img class="avatar" src="${userAvatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="msg-content">
                            <div class="username">${msg.data.name || "متابع"} ${badgesHtml}</div>
                            <div class="text">${msg.data.text || ""}</div>
                        </div>`;
                    chatContainer.prepend(msgDiv);
                    if (chatContainer.children.length > 15) chatContainer.removeChild(chatContainer.lastChild);
                }

                if (msg.type === "join") {
                    const joinDiv = document.createElement("div");
                    joinDiv.className = "join-notification";
                    const joinAvatar = msg.data.avatar || fallbackAvatar;
                    joinDiv.innerHTML = `
                        <img class="avatar" src="${joinAvatar}" onerror="this.src='${fallbackAvatar}'">
                        <div class="info">
                            <div class="name">${msg.data.name || "متابع جديد"}</div>
                            <div class="action">انضم إلى البث الآن ✨</div>
                        </div>`;
                    joinContainer.prepend(joinDiv);
                    setTimeout(() => { if (joinDiv.parentNode) joinContainer.removeChild(joinDiv); }, 5000); // تمديد الوقت لـ 5 ثوانٍ للهدوء
                }

                if (msg.type === "follow") {
                    const avatar = msg.data.avatar || fallbackAvatar;
                    const name   = msg.data.name || "متابع جديد";
                    const count  = msg.data.followerCount ? Number(msg.data.followerCount).toLocaleString() : "";
                    
                    // البنر يظهر لمدة 6 ثوانٍ كاملة ليعطي هيبة وهدوء في العرض والاختفاء
                    followContainer.innerHTML = `
                        <div class="follow-banner">
                            <img src="${avatar}" onerror="this.src='${fallbackAvatar}'">
                            <div class="follow-info">
                                <div class="follow-label">New Follower 👤</div>
                                <div class="follow-name">${name}</div>
                                ${count ? `<div class="follow-count">👥 متابعيك: ${count}</div>` : ""}
                            </div>
                            <div class="follow-icon">🎉</div>
                        </div>`;
                    setTimeout(() => { followContainer.innerHTML = ""; }, 6000);
                }

                if (msg.type === "gift") {
                    const giftAvatar = msg.data.avatar || fallbackAvatar;
                    // البنر يظهر لمدة 6 ثوانٍ مريحة وبطيئة
                    giftContainer.innerHTML = `
                        <div class="gift-banner">
                            <img src="${giftAvatar}" onerror="this.src='${fallbackAvatar}'">
                            <div class="gift-text">
                                <h2>🤍 شكراً: ${msg.data.name || "داعم كريم"}</h2>
                                <p>${msg.data.giftName} × ${msg.data.count}</p>
                            </div>
                        </div>`;
                    setTimeout(() => { giftContainer.innerHTML = ""; }, 6000);
                }

            } catch (e) {
                console.error("خطأ:", e);
            }
        };
    </script>
</body>
</html>
