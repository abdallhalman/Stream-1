name: test.06

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev \
            fonts-noto-color-emoji \
            curl

      - name: Install Python tools
        run: pip install gdown

      - name: Install Node tools
        run: npm install tiktok-live-connector canvas node-fetch@2

      - name: Download Video
        run: gdown 1QVMlr8fj3-qOR7EgVCtSxLeFYHADK4fk -O video.mp4

      - name: Download single audio file
        run: |
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O audio_raw.tmp && ffmpeg -i audio_raw.tmp audio.mp3 -y

      - name: Create overlay script
        run: |
          cat > overlay.js << 'EOF'
          const { WebcastPushConnection } = require("tiktok-live-connector");
          const { createCanvas, loadImage } = require("canvas");
          const { spawn } = require("child_process");
          const fetch = require("node-fetch");

          const TIKTOK_USER = "alarabiya";
          const STREAM_KEY = process.env.STREAM_KEY;
          const WIDTH = 1280;
          const HEIGHT = 720;
          const FPS = 30;

          // ── بيانات الحالة ──────────────────────────────────────────
          const imageCache = new Map();
          let chatEvents    = [];
          let currentGift   = null;
          let totalLikes    = 0;
          let viewerCount   = 0;
          let floatingHearts = [];
          let flyingJoiners  = [];

          // قائمة الداعمين Top 3  { name, giftName, count, avatarUrl }
          let topSupporters = [];

          // تصنيف المشاهدين بمدة البقاء  { name, avatarUrl, joinTime }
          let topViewers = [];

          // آخر 3 منضمين  { name, avatarUrl, time }
          let recentJoiners = [];

          // بانر المتابعة المؤقت  { name, followerCount, startTime }
          let followBanner = null;

          // ── FFmpeg ─────────────────────────────────────────────────
          const ffmpeg = spawn("ffmpeg", [
            "-f", "rawvideo",
            "-pixel_format", "rgba",
            "-video_size", `${WIDTH}x${HEIGHT}`,
            "-framerate", `${FPS}`,
            "-i", "pipe:0",
            "-stream_loop", "-1", "-re", "-i", "video.mp4",
            "-stream_loop", "-1", "-re", "-i", "audio.mp3",
            "-filter_complex", "[1:v][0:v]overlay=0:0[v]",
            "-map", "[v]", "-map", "2:a",
            "-c:v", "libx264", "-preset", "veryfast",
            "-b:v", "2500k", "-maxrate", "2500k", "-bufsize", "5000k",
            "-g", "60",
            "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
            "-f", "flv",
            `rtmp://live.restream.io/live/${STREAM_KEY}`
          ]);
          ffmpeg.stderr.on("data", d => process.stderr.write(d));
          ffmpeg.on("exit", code => { console.error("FFmpeg exit:", code); process.exit(code); });

          // ── مساعدات رسم ────────────────────────────────────────────
          function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, r);
          }

          function drawAvatar(ctx, img, cx, cy, r) {
            try {
              ctx.save();
              ctx.beginPath();
              ctx.arc(cx, cy, r, 0, Math.PI * 2);
              ctx.clip();
              ctx.drawImage(img, cx - r, cy - r, r * 2, r * 2);
              ctx.restore();
            } catch(e) {}
          }

          // ── drawFrame ──────────────────────────────────────────────
          async function drawFrame() {
            const canvas = createCanvas(WIDTH, HEIGHT);
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            const now = Date.now();

            // ── 1. عداد المشاهدين (أعلى يسار) ──────────────────────
            ctx.globalAlpha = 0.88;
            ctx.fillStyle = "#111111";
            roundRect(ctx, 20, 20, 220, 50, 25); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 14px sans-serif";
            ctx.textAlign = "left"; ctx.direction = "ltr";
            ctx.fillText("●", 38, 52);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 19px sans-serif";
            ctx.fillText(`LIVE: ${viewerCount.toLocaleString()}`, 58, 52);

            // ── 2. عداد الإعجابات (أعلى يمين) ──────────────────────
            ctx.globalAlpha = 0.88;
            ctx.fillStyle = "#111111";
            roundRect(ctx, WIDTH - 280, 20, 260, 50, 25); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = "#ff4444";
            ctx.font = "bold 18px sans-serif";
            ctx.textAlign = "left"; ctx.direction = "ltr";
            ctx.fillText("♥", WIDTH - 258, 52);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 19px sans-serif";
            ctx.textAlign = "right"; ctx.direction = "rtl";
            ctx.fillText(`الإعجابات: ${totalLikes.toLocaleString()}`, WIDTH - 30, 52);

            // ── 3. القلوب المتطايرة ──────────────────────────────────
            floatingHearts = floatingHearts.filter(h => now - h.startTime < h.duration);
            for (const h of floatingHearts) {
              const age = (now - h.startTime) / h.duration;
              if (age < 0) continue;
              ctx.globalAlpha = 1 - age;
              ctx.fillStyle = h.color;
              ctx.font = `${h.size}px sans-serif`;
              ctx.textAlign = "left";
              ctx.fillText("♥", h.x + Math.sin(age * 7) * 30, h.y - age * 400);
            }
            ctx.globalAlpha = 1;

            // ── 4. flyingJoiners (مرة واحدة فقط) ───────────────────
            flyingJoiners = flyingJoiners.filter(j => now - j.startTime < j.duration);
            for (const j of flyingJoiners) {
              const age = (now - j.startTime) / j.duration;
              const alpha = age < 0.15 ? age / 0.15 : age > 0.85 ? (1 - age) / 0.15 : 1;
              const x = j.startX + age * 340;
              const y = j.startY - age * 480;
              const sz = j.startSize + age * 10;
              ctx.font = `bold ${sz}px sans-serif`;
              const tw = ctx.measureText(j.text).width;
              ctx.globalAlpha = alpha * 0.75;
              ctx.fillStyle = "#111111";
              roundRect(ctx, x - 15, y - sz - 5, tw + 30, sz + 18, 15); ctx.fill();
              ctx.globalAlpha = alpha;
              ctx.fillStyle = "#00ffcc";
              ctx.textAlign = "left"; ctx.direction = "ltr";
              ctx.fillText(j.text, x, y);
            }
            ctx.globalAlpha = 1;

            // ── 5. السطر السفلي: 3 أقسام ────────────────────────────
            // الارتفاع والموضع المشترك للأسطر الثلاثة
            const ROW_H   = 52;
            const ROW_W   = 420;   // عرض كل خانة
            const COL_W   = ROW_W / 3;  // ~140px لكل خانة
            const ROW_Y3  = HEIGHT - 80;   // سطر الداعمين  (الأسفل)
            const ROW_Y2  = ROW_Y3 - ROW_H - 6; // سطر المشاهدين
            const ROW_Y1  = ROW_Y2 - ROW_H - 6; // سطر المنضمين
            const ROW_X   = 20;

            // ─ دالة رسم خانة واحدة ─
            function drawSlot(label, name, avatarUrl, bgColor, textColor, slotX, slotY) {
              ctx.globalAlpha = 0.82;
              ctx.fillStyle = bgColor;
              roundRect(ctx, slotX + 2, slotY, COL_W - 4, ROW_H - 2, 10); ctx.fill();
              ctx.globalAlpha = 1;
              // أفاتار
              if (avatarUrl && imageCache.has(avatarUrl)) {
                drawAvatar(ctx, imageCache.get(avatarUrl), slotX + 18, slotY + ROW_H / 2 - 1, 14);
              }
              // نص العنوان
              ctx.fillStyle = "#aaaaaa";
              ctx.font = "10px sans-serif";
              ctx.textAlign = "left"; ctx.direction = "ltr";
              ctx.fillText(label, slotX + 36, slotY + 16);
              // اسم
              ctx.fillStyle = textColor;
              ctx.font = "bold 13px sans-serif";
              let n = (name || "---");
              if (n.length > 12) n = n.substring(0, 11) + ".";
              ctx.fillText(n, slotX + 36, slotY + 34);
            }

            // ─ سطر 1: آخر 3 منضمين ─ لون أزرق فاتح ─
            for (let i = 0; i < 3; i++) {
              const j = recentJoiners[i];
              drawSlot(
                i === 0 ? "آخر منضم" : `منضم ${i + 1}`,
                j ? j.name : null,
                j ? j.avatarUrl : null,
                "#0d1f3c",
                "#7dd3fc",
                ROW_X + i * COL_W,
                ROW_Y1
              );
            }

            // ─ سطر 2: أطول 3 مشاهدين ─ لون بنفسجي ─
            const sortedViewers = [...topViewers].sort((a, b) => (now - a.joinTime) - (now - b.joinTime) > 0 ? -1 : 1).slice(0, 3);
            for (let i = 0; i < 3; i++) {
              const v = sortedViewers[i];
              const dur = v ? Math.floor((now - v.joinTime) / 60000) + "د" : null;
              drawSlot(
                i === 0 ? "أطول مشاهدة" : `مشاهد ${i + 1}`,
                v ? `${v.name}${dur ? " · " + dur : ""}` : null,
                v ? v.avatarUrl : null,
                "#1a0a2e",
                "#c084fc",
                ROW_X + i * COL_W,
                ROW_Y2
              );
            }

            // ─ سطر 3: Top 3 داعمين ─ لون ذهبي ─
            for (let i = 0; i < 3; i++) {
              const s = topSupporters[i];
              const rankColors = ["#FFD700", "#C0C0C0", "#CD7F32"];
              drawSlot(
                i === 0 ? "أفضل داعم" : `داعم ${i + 1}`,
                s ? `${s.name}` : null,
                s ? s.avatarUrl : null,
                "#1a1200",
                rankColors[i] || "#ffffff",
                ROW_X + i * COL_W,
                ROW_Y3
              );
            }

            // ── 6. التعليقات (فوق الأسطر الثلاثة) ──────────────────
            chatEvents = chatEvents.filter(e => now - e.time < 30000);
            const chatBottom = ROW_Y1 - 10;
            for (let i = 0; i < Math.min(chatEvents.length, 8); i++) {
              const e = chatEvents[i];
              const age = (now - e.time) / 30000;
              const alpha = Math.max(0, 1 - age);
              const y = chatBottom - i * 48;
              if (y < 90) continue;

              ctx.globalAlpha = alpha * 0.78;
              ctx.fillStyle = "#000000";
              roundRect(ctx, 20, y - 36, 640, 42, 8); ctx.fill();
              ctx.globalAlpha = alpha;

              // أفاتار
              if (e.avatarUrl && imageCache.has(e.avatarUrl)) {
                drawAvatar(ctx, imageCache.get(e.avatarUrl), 46, y - 14, 14);
              }

              // بادجات
              let xOff = 68;
              for (const bUrl of (e.badgeUrls || [])) {
                if (imageCache.has(bUrl)) {
                  try { ctx.drawImage(imageCache.get(bUrl), xOff, y - 28, 34, 17); } catch(er) {}
                  xOff += 38;
                }
              }

              ctx.fillStyle = e.color || "#ffffff";
              ctx.font = "bold 17px sans-serif";
              ctx.textAlign = "left"; ctx.direction = "ltr";
              let txt = e.text;
              if (txt.length > 58) txt = txt.substring(0, 55) + "...";
              ctx.fillText(txt, xOff + 4, y - 8);
            }

            // ── 7. بانر الهدية (وسط الشاشة) ─────────────────────────
            if (currentGift && now - currentGift.startTime < 4500) {
              const gAge = (now - currentGift.startTime) / 4500;
              let gA = gAge < 0.15 ? gAge / 0.15 : gAge > 0.85 ? (1 - gAge) / 0.15 : 1;
              const bW = 540, bH = 130;
              const bX = (WIDTH - bW) / 2, bY = (HEIGHT - bH) / 2 - 40;
              ctx.globalAlpha = gA * 0.92;
              ctx.fillStyle = "#1a0f2e";
              ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 3;
              roundRect(ctx, bX, bY, bW, bH, 20); ctx.fill(); ctx.stroke();
              ctx.globalAlpha = gA;
              if (currentGift.avatarUrl && imageCache.has(currentGift.avatarUrl))
                drawAvatar(ctx, imageCache.get(currentGift.avatarUrl), bX + 55, bY + 65, 35);
              if (currentGift.iconImage) {
                try { ctx.drawImage(currentGift.iconImage, bX + bW - 105, bY + 25, 80, 80); } catch(e) {}
              }
              ctx.fillStyle = "#FFD700";
              ctx.font = "bold 22px sans-serif";
              ctx.textAlign = "center"; ctx.direction = "rtl";
              ctx.fillText(currentGift.nameText, bX + bW / 2 + 10, bY + 52);
              ctx.fillStyle = "#ffffff";
              ctx.font = "bold 24px sans-serif";
              ctx.fillText(currentGift.countText, bX + bW / 2 + 10, bY + 95);
            } else { currentGift = null; }

            // ── 8. بانر المتابعة المؤقت (أسفل وسط) ──────────────────
            if (followBanner && now - followBanner.startTime < 5000) {
              const fAge = (now - followBanner.startTime) / 5000;
              let fA = fAge < 0.15 ? fAge / 0.15 : fAge > 0.85 ? (1 - fAge) / 0.15 : 1;
              const bW = 480, bH = 68;
              const bX = (WIDTH - bW) / 2;
              const bY = HEIGHT - 90;

              // تدرج ألوان زهري-بنفسجي
              const grad = ctx.createLinearGradient(bX, bY, bX + bW, bY);
              grad.addColorStop(0, "#6d28d9");
              grad.addColorStop(1, "#db2777");

              ctx.globalAlpha = fA * 0.92;
              ctx.fillStyle = grad;
              roundRect(ctx, bX, bY, bW, bH, 18); ctx.fill();

              ctx.globalAlpha = fA;
              if (followBanner.avatarUrl && imageCache.has(followBanner.avatarUrl))
                drawAvatar(ctx, imageCache.get(followBanner.avatarUrl), bX + 36, bY + 34, 22);

              ctx.fillStyle = "#ffffff";
              ctx.font = "bold 15px sans-serif";
              ctx.textAlign = "left"; ctx.direction = "ltr";
              ctx.fillText("تابع الآن:", bX + 66, bY + 26);
              ctx.font = "bold 20px sans-serif";
              ctx.fillStyle = "#fde68a";
              let fn = followBanner.name;
              if (fn.length > 20) fn = fn.substring(0, 18) + "..";
              ctx.fillText(fn, bX + 66, bY + 52);

              // عدد المتابعين يمين البانر
              ctx.fillStyle = "#ffffff";
              ctx.font = "bold 13px sans-serif";
              ctx.textAlign = "right"; ctx.direction = "ltr";
              ctx.fillText(`المتابعون: ${followBanner.followerCount.toLocaleString()}`, bX + bW - 14, bY + 42);
            } else { followBanner = null; }

            ctx.globalAlpha = 1;
            return canvas.toBuffer("raw");
          }

          // ── render loop ────────────────────────────────────────────
          async function renderLoop() {
            const interval = 1000 / FPS;
            while (true) {
              const start = Date.now();
              try {
                const frame = await drawFrame();
                await new Promise((res, rej) => {
                  ffmpeg.stdin.write(frame, err => err ? rej(err) : res());
                });
              } catch(err) { console.error("Render error:", err.message); }
              const wait = Math.max(0, interval - (Date.now() - start));
              await new Promise(r => setTimeout(r, wait));
            }
          }

          // ── image cache ────────────────────────────────────────────
          async function fetchImg(url) {
            if (!url || !url.startsWith("http")) return null;
            if (imageCache.has(url)) return imageCache.get(url);
            try {
              const res = await fetch(url, { timeout: 2000 });
              if (!res.ok) return null;
              const img = await loadImage(await res.buffer());
              imageCache.set(url, img);
              if (imageCache.size > 300) imageCache.delete(imageCache.keys().next().value);
              return img;
            } catch(e) { return null; }
          }

          // ── أحداث مساعدة ──────────────────────────────────────────
          function addChat(text, color, avatarUrl, badgeUrls = []) {
            try {
              chatEvents.unshift({ time: Date.now(), text, color, avatarUrl: avatarUrl || null, badgeUrls });
              if (chatEvents.length > 8) chatEvents.pop();
              if (avatarUrl) fetchImg(avatarUrl).catch(() => {});
              badgeUrls.forEach(b => fetchImg(b).catch(() => {}));
            } catch(e) {}
          }

          function triggerHearts() {
            const colors = ["#ff4444","#ff6b9d","#ff0055","#ff85a2","#00ffcc","#ffff00","#ff00ff","#00ff00","#00e5ff","#c084fc"];
            const count = Math.floor(Math.random() * 21) + 40;
            for (let i = 0; i < count; i++) {
              floatingHearts.push({
                startTime: Date.now() + i * (60 + Math.random() * 80),
                duration:  1500 + Math.random() * 1000,
                x: (WIDTH - 220) + (Math.random() * 400 - 200),
                y: HEIGHT - 30,
                size:  Math.floor(Math.random() * 16) + 18,
                color: colors[Math.floor(Math.random() * colors.length)]
              });
            }
            if (floatingHearts.length > 600) floatingHearts.splice(0, count);
          }

          function addJoiner(name, avatarUrl) {
            flyingJoiners.push({
              startTime: Date.now(), duration: 5000,
              startX: 40, startY: HEIGHT - 90, startSize: 20,
              text: `+ ${name}`
            });
            if (flyingJoiners.length > 3) flyingJoiners.shift();

            // آخر 3 منضمين
            recentJoiners.unshift({ name, avatarUrl: avatarUrl || null, time: Date.now() });
            if (recentJoiners.length > 3) recentJoiners.pop();
            if (avatarUrl) fetchImg(avatarUrl).catch(() => {});

            // تصنيف المشاهدين بمدة البقاء
            if (!topViewers.find(v => v.name === name)) {
              topViewers.push({ name, avatarUrl: avatarUrl || null, joinTime: Date.now() });
              if (topViewers.length > 20) topViewers.pop(); // نحتفظ بأكثر 20
            }
          }

          function updateSupporters(name, giftName, count, avatarUrl) {
            try {
              const ex = topSupporters.find(s => s.name === name);
              if (ex) { ex.count += count; ex.giftName = giftName; if (avatarUrl) ex.avatarUrl = avatarUrl; }
              else topSupporters.push({ name, giftName, count, avatarUrl: avatarUrl || null });
              topSupporters.sort((a, b) => b.count - a.count);
              if (topSupporters.length > 3) topSupporters = topSupporters.slice(0, 3);
              if (avatarUrl) fetchImg(avatarUrl).catch(() => {});
            } catch(e) {}
          }

          // ── TikTok اتصال ──────────────────────────────────────────
          const tiktok = new WebcastPushConnection(TIKTOK_USER);

          function connectTikTok() {
            console.log(`Connecting to: ${TIKTOK_USER}`);
            tiktok.connect()
                .then(() => console.log("Connected successfully to TikTok!"))
                .catch(err => {
                    console.error("Connection failed, retrying in 20s:", err.message);
                    setTimeout(connectTikTok, 20000);
                });
          }

          tiktok.on("join", data => {
            try {
              const name = data.nickname || data.uniqueId || "Guest";
              const pfp  = data.profilePictureUrl || null;
              addChat(`+ ${name} joined`, "#d580ff", pfp, []);
              addJoiner(name, pfp);
            } catch(e) {}
          });

          tiktok.on("roomUser", data => {
            if (data?.viewerCount !== undefined) viewerCount = data.viewerCount;
          });

          function handleComment(data) {
            try {
              const name = data.nickname || data.uniqueId || "متابع";
              const text = data.comment;
              const pfp  = data.profilePictureUrl;
              let badges = [];
              if (data.badges?.length) {
                data.badges.forEach(b => {
                  const u = b.url || b.image?.url;
                  if (u) badges.push(u);
                });
              }
              if (text) addChat(`${name}: ${text}`, "#ffffff", pfp, badges);
            } catch(e) {}
          }

          tiktok.on("comment", handleComment);
          tiktok.on("chat",    handleComment);

          tiktok.on("follow", data => {
            try {
              const name  = data.nickname || data.uniqueId || "متابع جديد";
              const pfp   = data.profilePictureUrl || null;
              const count = data.followCount || 0;
              addChat(`${name} تابع الحساب ✨`, "#ff6b9d", pfp, []);
              followBanner = { name, followerCount: count, avatarUrl: pfp, startTime: Date.now() };
              if (pfp) fetchImg(pfp).catch(() => {});
            } catch(e) {}
          });

          tiktok.on("like", data => {
            try {
              if (data.likeCount > 0) { totalLikes += Number(data.likeCount); triggerHearts(); }
            } catch(e) {}
          });

          tiktok.on("gift", data => {
            try {
              if (data.repeatEnd) {
                const name = data.nickname || data.uniqueId || "داعم كريم";
                const pfp  = data.profilePictureUrl;
                const giftObj = {
                  startTime: Date.now(),
                  nameText:  `* الداعم: ${name}`,
                  countText: `${data.giftName} x${data.repeatCount}`,
                  avatarUrl: pfp || null,
                  iconImage: null
                };
                currentGift = giftObj;
                updateSupporters(name, data.giftName, data.repeatCount || 1, pfp);
                if (pfp) fetchImg(pfp).catch(() => {});
                if (data.giftPictureUrl) {
                  fetch(data.giftPictureUrl).then(r => r.buffer()).then(b => loadImage(b))
                    .then(img => { if (img) giftObj.iconImage = img; }).catch(() => {});
                }
              }
            } catch(e) {}
          });

          setTimeout(connectTikTok, 45000);
                          renderLoop().catch(err => { console.error("Critical:", err); process.exit(1); });
          EOF

      - name: Start Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node overlay.js
