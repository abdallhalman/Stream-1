name: test13

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: self-hosted
    timeout-minutes: 2880
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev python3-pip
          pip3 install gdown --break-system-packages
          npm install canvas tiktok-live-connector

      - name: Download Media
        run: |
          gdown 1NXc6Qzw00ShvoQlZRvSQ-9_xqdyUw2j0 -O video.mp4
          gdown 1IbkCM0FYurEzKBBWB-GYyMVA-Js2zbQM -O a1.tmp && ffmpeg -i a1.tmp audio1.mp3 -y
          gdown 1XkDh8_5rNV8CZtgMdR-82lcWAVPbxwcL -O a2.tmp && ffmpeg -i a2.tmp audio2.mp3 -y
          ffmpeg -i audio1.mp3 -i audio2.mp3 \
            -filter_complex "[0:a][1:a]concat=n=2:v=0:a=1[a]" \
            -map "[a]" merged_audio.mp3 -y

      - name: Create overlay script
        run: |
          cat << 'EOF' > overlay.js
          const { createCanvas } = require("canvas");
          const { spawn } = require("child_process");
          const { WebcastPushConnection } = require("tiktok-live-connector");

          const WIDTH = 720, HEIGHT = 1280, FPS = 30;
          let particles = [];
          let intensity = 1; // تبدأ بكثافة خفيفة

          // الاتصال بـ TikTok Live
          const tiktok = new WebcastPushConnection(process.env.TIKTOK_USERNAME);
          tiktok.connect().catch(err => console.error("TikTok connect error:", err));

          // كل لايك يزيد الكثافة
          tiktok.on("like", data => {
            intensity = Math.min(intensity + (data.likeCount * 0.5), 50);
          });

          // كل هدية تزيد الكثافة أكثر
          tiktok.on("gift", data => {
            intensity = Math.min(intensity + (data.repeatCount * 2), 50);
          });

          // تقليل الكثافة تدريجياً مع الوقت
          setInterval(() => {
            intensity = Math.max(intensity - 0.2, 1);
          }, 1000);

          const ffmpeg = spawn("ffmpeg", [
            "-stream_loop", "-1", "-re", "-i", "video.mp4",
            "-stream_loop", "-1", "-i", "merged_audio.mp3",
            "-thread_queue_size", "1024",
            "-f", "rawvideo", "-pixel_format", "bgra",
            "-video_size", `${WIDTH}x${HEIGHT}`,
            "-framerate", `${FPS}`,
            "-i", "pipe:0",
            "-filter_complex",
            "[0:v]scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2,setsar=1[bg];" +
            "[bg][2:v]overlay=0:0[v];" +
            "[0:a][1:a]amix=inputs=2:duration=longest:weights=1 0.8[a]",
            "-map", "[v]",
            "-map", "[a]",
            "-c:v", "libx264", "-preset", "ultrafast",
            "-b:v", "2500k", "-bufsize", "8000k",
            "-g", "60", "-keyint_min", "60", "-sc_threshold", "0",
            "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
            "-f", "flv", `rtmp://live.restream.io/live/${process.env.STREAM_KEY}`
          ]);

          ffmpeg.stderr.on("data", d => process.stderr.write(d));

          async function render() {
            while (true) {
              const canvas = createCanvas(WIDTH, HEIGHT);
              const ctx = canvas.getContext("2d");
              ctx.clearRect(0, 0, WIDTH, HEIGHT);

              // توليد جسيمات حسب الكثافة الحالية
              const count = Math.floor(intensity);
              for (let i = 0; i < count; i++) {
                particles.push({
                  x: Math.random() * WIDTH,
                  y: HEIGHT,
                  vx: (Math.random() - 0.5) * 6,
                  vy: -(Math.random() * 4 + 2),
                  size: Math.random() * 8 + 3,
                  hue: Math.random() * 360,
                  life: 1
                });
              }

              // حد أقصى للجسيمات لتجنب ثقل المعالج
              if (particles.length > 800) particles = particles.slice(-800);
              particles = particles.filter(p => p.life > 0);

              particles.forEach(p => {
                p.life -= 0.015;
                p.x += p.vx;
                p.y += p.vy;
                p.vx += (Math.random() - 0.5) * 0.5;
                ctx.globalAlpha = p.life * 0.8;
                ctx.fillStyle = `hsl(${p.hue}, 100%, 60%)`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
              });

              ffmpeg.stdin.write(canvas.toBuffer("raw"));
              await new Promise(r => setTimeout(r, 1000 / FPS));
            }
          }

          render();
          EOF

      - name: Start Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
        run: node overlay.js
