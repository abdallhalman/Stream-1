name: test13

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: self-hosted
    timeout-minutes: 2880
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
          npm install canvas node-fetch@2

      - name: Download Media
        run: |
          # تحميل الخلفية (استبدل الرابط برابط صورتك)
          gdown 1u2rg5rui0RcaT2Tv4zXyPOpCqQcj9ezk -O background.png
          # تحميل الملفات الصوتية ودمجها
          gdown 1IbkCM0FYurEzKBBWB-GYyMVA-Js2zbQM -O a1.tmp && ffmpeg -i a1.tmp audio1.mp3 -y
          gdown 1XkDh8_5rNV8CZtgMdR-82lcWAVPbxwcL -O a2.tmp && ffmpeg -i a2.tmp audio2.mp3 -y
          ls audio*.mp3 | shuf > playlist.txt
          ffmpeg -f concat -safe 0 -i <(sed 's/^/file /' playlist.txt) -c copy merged_audio.mp3 -y

      - name: Create overlay script
        run: |
          cat << 'EOF' > overlay.js
          const { createCanvas, loadImage } = require("canvas");
          const { spawn } = require("child_process");
          const WIDTH = 720, HEIGHT = 1280, FPS = 30;
          let angle = 0, particles = [], logoImg = null, bgImg = null;
          
          loadImage("logo.png").then(img => { logoImg = img; });
          loadImage("background.png").then(img => { bgImg = img; });

          const ffmpeg = spawn("ffmpeg", [
            "-thread_queue_size", "1024", "-f", "rawvideo", "-pixel_format", "bgra",
            "-video_size", `${WIDTH}x${HEIGHT}`, "-framerate", `${FPS}`, "-i", "pipe:0",
            "-stream_loop", "-1", "-re", "-i", "merged_audio.mp3",
            "-c:v", "libx264", "-preset", "veryfast", "-b:v", "2000k",
            "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
            "-f", "flv", `rtmp://live.restream.io/live/${process.env.STREAM_KEY}`
          ]);

          async function render() {
            while(true) {
              const canvas = createCanvas(WIDTH, HEIGHT);
              const ctx = canvas.getContext("2d");
              
              // 1. رسم الخلفية الثابتة
              if(bgImg) ctx.drawImage(bgImg, 0, 0, WIDTH, HEIGHT);
              else { ctx.fillStyle = "#000"; ctx.fillRect(0, 0, WIDTH, HEIGHT); }

              // 2. رسم الشعار الدوار
              if(logoImg) {
                ctx.save(); ctx.translate(WIDTH/2, HEIGHT/2); ctx.rotate(angle+=0.02);
                ctx.drawImage(logoImg, -125, -125, 250, 250); ctx.restore();
              }
              
              // 3. رسم الدخان
              particles.push({x: WIDTH/2, y: HEIGHT/2 + 100, vx: (Math.random()-0.5)*8, vy: -5, life: 1});
              particles = particles.filter(p => p.life > 0);
              particles.forEach(p => { 
                p.life -= 0.02; ctx.fillStyle = `hsl(${Math.random()*360}, 100%, 50%)`; 
                ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x+=p.vx, p.y+=p.vy, 5, 0, Math.PI*2); ctx.fill(); 
              });
              
              ffmpeg.stdin.write(canvas.toBuffer("raw"));
              await new Promise(r => setTimeout(r, 33));
            }
          }
          render();
          EOF
      
      - name: Start Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node overlay.js
