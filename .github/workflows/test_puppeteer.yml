name: test.puppeteer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: self-hostedt
    timeout-minutes: 2880
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Install fonts
        run: sudo apt-get install -y fonts-noto fonts-noto-cjk fonts-noto-color-emoji

      - name: Download Almarai font (غير متوفر كخط نظام، يُحمّل ويُسجَّل يدوياً في renderer.js)
        run: |
          mkdir -p .github/workflows/fonts
          curl -L -o .github/workflows/fonts/Almarai-Regular.ttf   "https://raw.githubusercontent.com/google/fonts/main/ofl/almarai/Almarai-Regular.ttf"
          curl -L -o .github/workflows/fonts/Almarai-Bold.ttf      "https://raw.githubusercontent.com/google/fonts/main/ofl/almarai/Almarai-Bold.ttf"
          curl -L -o .github/workflows/fonts/Almarai-ExtraBold.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/almarai/Almarai-ExtraBold.ttf"

      - name: Install Python tools
        run: pip install gdown --upgrade --force-reinstall

      - name: Install Node tools
        run: npm install tiktok-live-connector@2.1.1-beta1 @napi-rs/canvas

      - name: Download audio files
        run: |
          mkdir -p downloads
          # اختيار 5 أرقام عشوائية من 1 إلى 18
          SELECTED=$(shuf -i 1-18 -n 5)
          i=1
          for NUM in $SELECTED; do
            curl -L "https://huggingface.co/datasets/abdallhslman/stream-engine/resolve/main/audios_permanent/audio${NUM}.mp3" -o downloads/audio${i}.mp3
            i=$((i+1))
          done

      - name: Download Video
        run: curl -L -o video.mp4 "https://huggingface.co/datasets/abdallhslman/stream-engine/resolve/main/video.mp4"

      - name: Create playlist and merge
        run: |
          ls downloads/audio*.mp3 | shuf > all_shuffled.txt
          awk '{print "file \047" $0 "\047"}' all_shuffled.txt > selected_list.txt
          ffmpeg -f concat -safe 0 -i selected_list.txt -c copy merged_audio.mp3 -y
          rm -f all_shuffled.txt selected_list.txt

      - name: Run Stream Server
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          EULER_API_KEY: ${{ secrets.EULER_API_KEY }}
        run: node .github/workflows/server.js
