name: test.puppeteer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: self-hosted
    timeout-minutes: 350
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            fonts-noto-color-emoji \
            curl \
            libgbm1 \
            libasound2 \
            libnss3 \
            libxss1 \
            libgtk-3-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0

      - name: Install Python tools
        run: pip install gdown

      - name: Install Node tools
        run: npm install tiktok-live-connector puppeteer ws

      # 1. محاولة استعادة الكاش القديم فقط (بدون تفعيل الحفظ التلقائي عند الإلغاء)
      - name: Restore audio cache
        id: audio-cache
        uses: actions/cache/restore@v3
        with:
          path: downloads
          key: audio-downloads-v4

      # ── تحميل وتحويل الأصوات إلى MP3 حقيقي (في أول رن فقط) ──
      - name: Download multiple audio files
        if: steps.audio-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p downloads
          gdown 1HlQRc8k574Uatup7i1Itb8J0AqLOETbG -O downloads/t1.tmp && ffmpeg -i downloads/t1.tmp -vn -ar 44100 -ac 2 -b:a 192k downloads/audio1.mp3 -y
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O downloads/t2.tmp && ffmpeg -i downloads/t2.tmp -vn -ar 44100 -ac 2 -b:a 192k downloads/audio2.mp3 -y

      # ── تحميل الفيديو الرئيسي خارج الكاش ──
      - name: Download Video
        run: gdown 1NXc6Qzw00ShvoQlZRvSQ-9_xqdyUw2j0 -O video.mp4

            # ── 4. فحص الكاش، خلط الملفات، حسم الـ 6 ساعات، وتطبيق فلاتر كسر البصمة القوية ──
      - name: Create playlist and merge
        run: |
          # 1. خلط ترتيب كل ملفات الكاش الـ 17 عشوائياً وحفظ القائمة في ملف مؤقت
          ls downloads/audio*.mp3 | shuf > all_shuffled.txt

          # 3. دمج الملفات المختارة عشوائياً بشكل مبدئي وسريع
          ffmpeg -f concat -safe 0 -i selected_list.txt -c copy temp_raw.mp3 -y
          
          # 4. توليد قيم عشوائية متغيرة لكسر البصمة (السرعة والنبرة والتردد)
          # توليد سرعة عشوائية خفيفة جداً بين 0.985 و 1.015
          TEMPO=$(awk "BEGIN {srand(); print 0.985 + (rand() * 0.03)}")
          # توليد طبقة صوت (Pitch) عشوائية لتغيير هوية الموجة الصوتية
          PITCH=$(awk "BEGIN {srand(); print 0.99 + (rand() * 0.02)}")
          
          # 6. تنظيف كافة الملفات المؤقتة
          rm -f temp_raw.mp3 all_shuffled.txt selected_list.txt


      # ── تشغيل السيرفر والبث ──
      - name: Run Puppeteer Stream Server
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node .github/workflows/server.js

      # 2. خطوة الحفظ الإجبارية: ستعمل دائماً حتى لو ضغطت Cancel يدويّاً!
      - name: Save audio cache forced
        uses: actions/cache/save@v3
        if: always() && steps.audio-cache.outputs.cache-hit != 'true'
        with:
          path: downloads
          key: audio-downloads-v4
