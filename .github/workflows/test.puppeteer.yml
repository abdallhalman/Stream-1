name: test.puppeteer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            fonts-noto-color-emoji \
            curl \
            libgbm1 \
            libasound2t64 \
            libnss3 \
            libxss1 \
            libgtk-3-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0

      - name: Install Python tools
        run: pip install gdown

      - name: Install Node tools
        run: npm install tiktok-live-connector puppeteer ws

      - name: Download Video
        run: gdown 1NXc6Qzw00ShvoQlZRvSQ-9_xqdyUw2j0 -O video.mp4

      # ── تحميل الـ 5 ملفات صوتية الصحيحة من ملف 12 ──
      - name: Download multiple audio files (5 Assets)
        run: |
          gdown 1HlQRc8k574Uatup7i1Itb8J0AqLOETbG -O a1.tmp && ffmpeg -i a1.tmp audio1.mp3 -y
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O a2.tmp && ffmpeg -i a2.tmp audio2.mp3 -y
          gdown 1gkoZQ8Imfxorb25N3mRMpwkf7ZPwJwQU -O a3.tmp && ffmpeg -i a3.tmp audio3.mp3 -y
          gdown 1E6THGzxM3_Heaxp4Zh-KIIr5n59aqdtW -O a4.tmp && ffmpeg -i a4.tmp audio4.mp3 -y
          gdown 10Z5lBwM4zr3JsEcd_2KY7vB0qOJRjNjo -O a5.tmp && ffmpeg -i a5.tmp audio5.mp3 -y
          gdown 1LWeZNOiCz4ZLeHIw3Ga8tAX8WWDlr7r3 -O a6.tmp && ffmpeg -i a6.tmp audio6.mp3 -y
          gdown 17nqAmBYExskUmySAzB51NAxic5XJRuLj -O a7.tmp && ffmpeg -i a7.tmp audio7.mp3 -y
          gdown 1fK1m2SBkGOw5hjXnM9bpoTcH0jGdp4AL -O a8.tmp && ffmpeg -i a8.tmp audio8.mp3 -y
          gdown 1JbdI4Tpu_EtfYP3ZMjFZdAj42dVBXfoB -O a9.tmp && ffmpeg -i a9.tmp audio9.mp3 -y
          gdown 1MxcrvN0GUGAdXMKYW1r3zOQ3Fmluk6mI -O a10.tmp && ffmpeg -i a10.tmp audio10.mp3 -y
          gdown 1TXbWo89v0e8RMkwuuwkilB24LdCc0Xkn -O a11.tmp && ffmpeg -i a11.tmp audio11.mp3 -y
          gdown 1UMkrpGqC_E_YB7qmLuBBKRnt2cOOf5HL -O a12.tmp && ffmpeg -i a12.tmp audio12.mp3 -y
          gdown 1IbkCM0FYurEzKBBWB-GYyMVA-Js2zbQM -O a13.tmp && ffmpeg -i a13.tmp audio13.mp3 -y
          gdown 1XkDh8_5rNV8CZtgMdR-82lcWAVPbxwcL -O a14.tmp && ffmpeg -i a14.tmp audio14.mp3 -y
          gdown 1BVe4zBJBYdkSgCpyWG7Xi4iMbbyVX5Eq -O a15.tmp && ffmpeg -i a15.tmp audio15.mp3 -y
          gdown 1F2LQM5tQjJkyA2u_kTzKf3uTm7gS8F_S -O a16.tmp && ffmpeg -i a16.tmp audio16.mp3 -y
          gdown 1qkBtQe6NHlKoThu4W1jIT4Nc7HoEzOef -O a17.tmp && ffmpeg -i a17.tmp audio17.mp3 -y


      # ── إنشاء قائمة التشغيل العشوائية والدمج السريع بالفيديو والصوت من ملف 12 ──
      - name: Create playlist and merge
        run: |
          ls audio*.mp3 | shuf > playlist.txt
          while IFS= read -r file; do
            echo "file '$file'"
          done < playlist.txt > concat.txt
          ffmpeg -f concat -safe 0 -i concat.txt -c copy merged_audio.mp3 -y

      - name: Run Puppeteer Stream Server
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node .github/workflows/server.js
        
