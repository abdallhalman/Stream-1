name: test.puppeteer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            fonts-noto-color-emoji \
            curl \
            libgbm1 \
            libasound2t64 \
            libnss3 \
            libxss1 \
            libgtk-3-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0

      - name: Install Python tools
        run: pip install gdown

      - name: Install Node tools
        run: npm install tiktok-live-connector puppeteer ws

      # ── الكاش يحفظ مجلد downloads (الأصوات الأصلية فقط) ──
      - name: Cache downloaded audio
        id: audio-cache
        uses: actions/cache@v3
        with:
          path: downloads
          key: audio-downloads-v2

      # ── تحميل الأصوات الأصلية (يحدث في أول رن فقط، ثم يُستدعى من الكاش) ──
      - name: Download multiple audio files
        if: steps.audio-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p downloads
          gdown 1HlQRc8k574Uatup7i1Itb8J0AqLOETbG -O downloads/audio1.mp3
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O downloads/audio2.mp3
          gdown 1gkoZQ8Imfxorb25N3mRMpwkf7ZPwJwQU -O downloads/audio3.mp3
          gdown 1E6THGzxM3_Heaxp4Zh-KIIr5n59aqdtW -O downloads/audio4.mp3
          gdown 10Z5lBwM4zr3JsEcd_2KY7vB0qOJRjNjo -O downloads/audio5.mp3
          gdown 1LWeZNOiCz4ZLeHIw3Ga8tAX8WWDlr7r3 -O downloads/audio6.mp3
          gdown 17nqAmBYExskUmySAzB51NAxic5XJRuLj -O downloads/audio7.mp3
          gdown 1fK1m2SBkGOw5hjXnM9bpoTcH0jGdp4AL -O downloads/audio8.mp3
          gdown 1JbdI4Tpu_EtfYP3ZMjFZdAj42dVBXfoB -O downloads/audio9.mp3
          gdown 1MxcrvN0GUGAdXMKYW1r3zOQ3Fmluk6mI -O downloads/audio10.mp3
          gdown 1TXbWo89v0e8RMkwuuwkilB24LdCc0Xkn -O downloads/audio11.mp3
          gdown 1UMkrpGqC_E_YB7qmLuBBKRnt2cOOf5HL -O downloads/audio12.mp3
          gdown 1IbkCM0FYurEzKBBWB-GYyMVA-Js2zbQM -O downloads/audio13.mp3
          gdown 1XkDh8_5rNV8CZtgMdR-82lcWAVPbxwcL -O downloads/audio14.mp3
          gdown 1BVe4zBJBYdkSgCpyWG7Xi4iMbbyVX5Eq -O downloads/audio15.mp3
          gdown 1F2LQM5tQjJkyA2u_kTzKf3uTm7gS8F_S -O downloads/audio16.mp3
          gdown 1qkBtQe6NHlKoThu4W1jIT4Nc7HoEzOef -O downloads/audio17.mp3

      # ── الخلط والدمج يتم بالخارج في كل رن بشكل مستقل تماماً ──
      - name: Create playlist and merge
        run: |
          # نأخذ الملفات من مجلد الكاش ونخلط الترتيب
          ls downloads/audio*.mp3 | shuf > playlist.txt
          
          # تجهيز القائمة لـ ffmpeg
          while IFS= read -r file; do
            echo "file '$file'"
          done < playlist.txt > concat.txt
          
          # إنتاج ملف الصوت المخلوط الجديد في المجلد الرئيسي (خارج مجلد الكاش)
          ffmpeg -f concat -safe 0 -i concat.txt -c copy merged_audio.mp3 -y

      - name: Run Puppeteer Stream Server
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node .github/workflows/server.js
