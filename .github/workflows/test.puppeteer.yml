name: test.puppeteer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: self-hosted
    timeout-minutes: 2880
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            fonts-noto-color-emoji \
            curl \
            libgbm1 \
            libasound2 \
            libnss3 \
            libxss1 \
            libgtk-3-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0

      - name: Install Python tools
        run: pip install gdown --upgrade --force-reinstall
        
      - name: Install Node tools
        run: npm install tiktok-live-connector puppeteer ws

      - name: Download audio files
        run: |
          mkdir -p downloads
          gdown 1X4Wua4i4xluAv4PiW_0WZCPwOYEPKMSX -O downloads/audio1.mp3
          gdown 1h1nwxVWf9r4g0eHCNaXsHO8lEmRYFSH2 -O downloads/audio2.mp3
          gdown 1SL39WxTPwMV2OK5BeM-D1qUPKGuT55av -O downloads/audio3.mp3
          gdown 1JOHJobbIyHr05XuCBUVjAkI67I_aoSb6 -O downloads/audio4.mp3
          gdown 16TSjh8OKG3IbKkf9EYONSEkCzyPbCR70 -O downloads/audio5.mp3
          
      - name: Download Video
        run: |
          pip install yt-dlp -q
          yt-dlp "https://drive.google.com/file/d/1NXc6Qzw00ShvoQlZRvSQ-9_xqdyUw2j0/view" -o video.mp4

      - name: Create playlist and merge
        run: |
          ls downloads/audio*.mp3 | shuf > all_shuffled.txt
          awk '{print "file \047" $0 "\047"}' all_shuffled.txt > selected_list.txt
          ffmpeg -f concat -safe 0 -i selected_list.txt -c copy merged_audio.mp3 -y
          rm -f all_shuffled.txt selected_list.txt

      - name: Run Puppeteer Stream Server
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node .github/workflows/server.js
