name: Stream
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:

      - name: Install tools
        run: |
          sudo apt-get install -y ffmpeg

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            video_h264.mp4
            merged_audio.mp3
          key: media-files-v2

      - name: Start Stream
        run: |
          ffmpeg -stream_loop -1 -re -i video_h264.mp4 \
          -stream_loop -1 -re -i merged_audio.mp3 \
          -map 0:v -map 1:a -c:v copy -c:a aac -b:a 128k \
          -f flv rtmp://live.restream.io/live/${{ secrets.STREAM_KEY }}
