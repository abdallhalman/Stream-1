name: Stream
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:

      - name: Install tools
        run: |
          sudo apt-get install -y ffmpeg

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            video1.mp4
            video2.mp4
            video3.mp4
            video4.mp4
            video5.mp4
            video_concat.txt
            merged_audio.mp3
          key: media-files-v3

      - name: Start Stream
        run: |
          ffmpeg -f concat -safe 0 -stream_loop -1 -re -i video_concat.txt \
          -stream_loop -1 -re -i merged_audio.mp3 \
          -map 0:v -map 1:a -c:v copy -c:a aac -b:a 128k \
          -f flv rtmp://live.restream.io/live/${{ secrets.STREAM_KEY }}
          echo "ffmpeg exit code: $?"
