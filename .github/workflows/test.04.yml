name: test.04
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            fonts-noto-color-emoji \
            fonts-dejavu-core \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install Python tools
        run: pip install gdown

      - name: Install Node tools
        run: npm install tiktok-live-connector canvas node-fetch@2

      - name: Download video
        run: gdown 1QVMlr8fj3-qOR7EgVCtSxLeFYHADK4fk -O video.mp4

      - name: Download single audio file
        run: |
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O audio_temp.tmp
          ffmpeg -i audio_temp.tmp -c:a libmp3lame -q:a 2 single_audio.mp3 -y

      - name: Create overlay script
        run: |
          cat > overlay.js << 'EOF'
          const { WebcastPushConnection } = require("tiktok-live-connector");
          const { createCanvas, loadImage } = require("canvas");
          const { spawn } = require("child_process");
          const fetch = require("node-fetch");

          const TIKTOK_USER = process.env.TIKTOK_USER || "qurankareem.11com";
          const STREAM_KEY = process.env.STREAM_KEY;
          const WIDTH = 1280;
          const HEIGHT = 720;
          const FPS = 30;

          // مصفوفات ومخازن الحالات الجديدة
          let chatEvents = [];  // للتعليقات والمتابعات فقط
          let currentGift = null; // للهدايا الحالية في المنتصف
          let totalLikes = 0;   // عداد رقمي إجمالي للايكات
          let floatingHearts = []; // للقلوب المتطايرة

          const ffmpeg = spawn("ffmpeg", [
            "-f", "rawvideo",
            "-pixel_format", "rgba",
            "-video_size", `${WIDTH}x${HEIGHT}`,
            "-framerate", `${FPS}`,
            "-i", "pipe:0",
            "-stream_loop", "-1",
            "-re",
            "-i", "video.mp4",
            "-stream_loop", "-1",
            "-re",
            "-i", "single_audio.mp3",
            "-filter_complex", "[1:v][0:v]overlay=0:0[v]",
            "-map", "[v]",
            "-map", "2:a",
            "-c:v", "libx264",
            "-preset", "veryfast",
            "-b:v", "2500k",
            "-maxrate", "2500k",
            "-bufsize", "5000k",
            "-g", "60", 
            "-c:a", "aac",
            "-b:a", "128k",
            "-ar", "44100",
            "-f", "flv",
            `rtmp://live.restream.io/live/${STREAM_KEY}`
          ]);

          ffmpeg.stderr.on("data", d => process.stderr.write(d));
          ffmpeg.on("exit", code => {
            console.error("ffmpeg خرج بكود:", code);
            process.exit(code);
          });

          // دالة رسم الشاشة المتطورة (تقسيم الواجهة الجديد)
          async function drawFrame() {
            const canvas = createCanvas(WIDTH, HEIGHT);
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            const now = Date.now();

            // ----------------------------------------------------
            // 1. رسم عداد اللايكات الرقمي (أعلى اليمين بشكل شيك)
            // ----------------------------------------------------
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = "#222222";
            ctx.beginPath();
            ctx.roundRect(WIDTH - 260, 20, 240, 50, 25);
            ctx.fill();
            
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "#ff4444";
            ctx.font = "bold 24px 'DejaVu Sans'";
            ctx.textAlign = "center";
            ctx.fillText("❤️", WIDTH - 230, 53);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 20px 'DejaVu Sans'";
            ctx.textAlign = "right";
            ctx.direction = "rtl";
            ctx.fillText(`الإعجابات: ${totalLikes.toLocaleString()}`, WIDTH - 40, 52);

            // ----------------------------------------------------
            // 2. رسم القلوب المتطايرة (تأثير بصري متحرك تصاعدي)
            // ----------------------------------------------------
            floatingHearts = floatingHearts.filter(h => now - h.startTime < h.duration);
            for (let heart of floatingHearts) {
              const age = (now - heart.startTime) / heart.duration;
              const alpha = 1 - age; // تختفي بالتدريج كلما ارتفعت
              const x = heart.x + Math.sin(age * 5) * 20; // حركة موجية يميناً ويساراً
              const y = heart.y - (age * 300); // ترتفع للأعلى بمقدار 300 بكسل

              ctx.globalAlpha = alpha;
              ctx.font = `${heart.size}px 'DejaVu Sans'`;
              ctx.fillText("❤️", x, y);
            }
            ctx.globalAlpha = 1.0; // إعادة الشفافية كاملة

            // ----------------------------------------------------
            // 3. رسم قائمة الشات الممتدة (10 أسطر للتعليقات والمتابعين فقط)
            // ----------------------------------------------------
            chatEvents = chatEvents.filter(e => now - e.time < 6000); // زيادة مدة البقاء لـ 6 ثوانٍ
            
            for (let i = 0; i < Math.min(chatEvents.length, 10); i++) {
              const e = chatEvents[i];
              const age = (now - e.time) / 6000;
              const alpha = Math.max(0, 1 - age);
              // رفعنا المستوى إلى الأعلى لتستوعب 10 أسطر (تبدأ من إحداثي مسافة مريحة من الأسفل)
              const y = HEIGHT - 60 - (i * 55); 
              if (y < 40) continue;

              ctx.globalAlpha = alpha * 0.65;
              ctx.fillStyle = "#000000";
              ctx.beginPath();
              ctx.roundRect(15, y - 38, 580, 48, 10); 
              ctx.fill();

              ctx.globalAlpha = alpha;

              if (e.avatarImage) {
                try {
                  ctx.save();
                  ctx.beginPath();
                  ctx.arc(42, y - 14, 16, 0, Math.PI * 2);
                  ctx.clip();
                  ctx.drawImage(e.avatarImage, 26, y - 30, 32, 32);
                  ctx.restore();
                } catch(err) {}
              }

              ctx.fillStyle = e.color || "#ffffff";
              ctx.font = "bold 18px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
              ctx.textAlign = "left"; 
              ctx.direction = "rtl";
              
              let printText = e.text;
              if (printText.length > 55) printText = printText.substring(0, 52) + "...";
              ctx.fillText(printText, 75, y - 6);
            }

            // ----------------------------------------------------
            // 4. رسم الهدايا الكبيرة والمتميزة (في وسط الشاشة)
            // ----------------------------------------------------
            if (currentGift && now - currentGift.startTime < 4000) {
              const gAge = (now - currentGift.startTime) / 4000;
              let gAlpha = 1;
              
              // تأثير دخول (أول نصف ثانية) وتأثير خروج (آخر نصف ثانية)
              if (gAge < 0.125) gAlpha = gAge / 0.125;
              else if (gAge > 0.875) gAlpha = (1 - gAge) / 0.125;

              ctx.globalAlpha = gAlpha * 0.85;
              
              // خلفية فخمة ومميزة في المنتصف للهدايا
              const boxWidth = 500;
              const boxHeight = 120;
              const boxX = (WIDTH - boxWidth) / 2;
              const boxY = (HEIGHT - boxHeight) / 2 - 50;

              ctx.fillStyle = "#1e1035"; // لون بنفسجي غامق ملكي للهدايا
              ctx.strokeStyle = "#FFD700"; // إطار ذهبي
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 20);
              ctx.fill();
              ctx.stroke();

              ctx.globalAlpha = gAlpha;

              // رسم صورة الأفاتار وصورة الهدية بحجم كبير داخل بنية الهدية
              if (currentGift.avatarImage) {
                try {
                  ctx.save();
                  ctx.beginPath();
                  ctx.arc(boxX + 50, boxY + 60, 35, 0, Math.PI * 2);
                  ctx.clip();
                  ctx.drawImage(currentGift.avatarImage, boxX + 15, boxY + 25, 70, 70);
                  ctx.restore();
                } catch(err) {}
              }

              if (currentGift.iconImage) {
                try {
                  ctx.drawImage(currentGift.iconImage, boxX + boxWidth - 100, boxY + 20, 80, 80);
                } catch(err) {}
              }

              // نصوص التهنئة بالهدية
              ctx.fillStyle = "#FFD700"; // اسم الداعم بالذهب
              ctx.font = "bold 22px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
              ctx.textAlign = "center";
              ctx.direction = "rtl";
              ctx.fillText(currentGift.nameText, boxX + (boxWidth / 2) + 10, boxY + 50);

              ctx.fillStyle = "#ffffff"; // تفاصيل الهدية والعدد باللون الأبيض
              ctx.font = "bold 26px 'DejaVu Sans'";
              ctx.fillText(currentGift.countText, boxX + (boxWidth / 2) + 10, boxY + 95);
            } else {
              currentGift = null; // تصفير لتجهيز الهدية القادمة
            }

            ctx.globalAlpha = 1.0;
            return canvas.toBuffer("raw");
          }

          async function renderLoop() {
            const interval = 1000 / FPS;
            while (true) {
              const start = Date.now();
              try {
                const frame = await drawFrame();
                await new Promise((resolve, reject) => {
                  ffmpeg.stdin.write(frame, err => {
                    if (err) reject(err);
                    else resolve();
                  });
                });
              } catch (err) {
                console.error("خطأ في حلقة الرسم:", err.message);
              }
              const elapsed = Date.now() - start;
              const wait = Math.max(0, interval - elapsed);
              await new Promise(r => setTimeout(r, wait));
            }
          }

          async function fetchImage(url) {
            if (!url) return null;
            try {
              const res = await fetch(url, { timeout: 1500 });
              const buf = await res.buffer();
              return await loadImage(buf);
            } catch (e) { return null; }
          }

          // إضافة حدث إلى قائمة التعليقات والمتابعات فقط
          function addChatEvent(text, color, avatarUrl) {
            const newEvent = {
              time: Date.now(),
              text,
              color,
              avatarImage: null
            };
            chatEvents.unshift(newEvent);
            if (chatEvents.length > 20) chatEvents.pop();

            if (avatarUrl) {
              fetchImage(avatarUrl).then(img => { if(img) newEvent.avatarImage = img; });
            }
          }

          // دالة إطلاق القلوب المتطايرة عند حدوث لايك
          function triggerHeartEffect() {
            // نطلق من قلوب إلى 3 قلوب دفعة واحدة في أماكن عشوائية قريبة من عداد اللايكات
            const count = Math.floor(Math.random() * 3) + 1;
            for(let i=0; i<count; i++) {
              floatingHearts.push({
                startTime: Date.now(),
                duration: 2000 + Math.random() * 1000, // مدة الطيران بين ثانيتين لـ 3 ثوانٍ
                x: (WIDTH - 180) + (Math.random() * 100 - 50), // تنطلق من تحت العداد تقريباً
                y: HEIGHT - 50, // تبدأ الطيران صعوداً من أسفل الشاشة جهة اليمين
                size: Math.floor(Math.random() * 15) + 20 // أحجام قلوب متفاوتة
              });
            }
            if (floatingHearts.length > 40) floatingHearts.shift(); // حماية السيرفر من الكثرة
          }

          if (TIKTOK_USER) {
            const tiktok = new WebcastPushConnection(TIKTOK_USER);

            function connectTikTok() {
              console.log("🔄 جاري الاتصال بـ TikTok Live...");
              tiktok.connect()
                .then(() => console.log("✅ متصل بنجاح بالبث"))
                .catch(err => {
                  console.error("⚠️ فشل الاتصال، إعادة المحاولة:", err.message);
                  setTimeout(connectTikTok, 20000);
                });
            }

            console.log("⏳ انتظار 15 ثانية للربط السريع...");
            setTimeout(connectTikTok, 15000);

            // 1. التعليقات (تذهب لليسار)
            tiktok.on("comment", data => {
              const userName = data.nickname || data.uniqueId || "متابع";
              if (data.comment) {
                addChatEvent(`💬 ${userName}: ${data.comment}`, "#ffffff", data.profilePictureUrl);
              }
            });

            // 2. المتابعات (تشارك التعليقات نفس الصندوق الأيسر)
            tiktok.on("follow", data => {
              const userName = data.nickname || data.uniqueId || "متابع جديد";
              addChatEvent(`👤 ${userName} تابع الحساب الآن`, "#ff6b9d", data.profilePictureUrl);
            });

            // 3. اللايكات المحدثة (عداد رقمي فقط + تأثير قلوب متطايرة تفاعلية)
            tiktok.on("like", data => {
              if (data.likeCount && data.likeCount > 0) {
                totalLikes += data.likeCount; // إضافة الرقم للعداد التراكمي المباشر
                triggerHeartEffect(); // تشغيل تأثير القلوب الطائرة على الشاشة
              }
            });

            // 4. الهدايا المتميزة (تظهر لوحدها كبيرة في منتصف الشاشة)
            tiktok.on("gift", data => {
              if (data.repeatEnd) {
                const userName = data.nickname || data.uniqueId || "داعم كريم";
                
                const giftObj = {
                  startTime: Date.now(),
                  nameText: `${userName}`,
                  countText: `أرسل ${data.giftName} x${data.repeatCount}`,
                  avatarImage: null,
                  iconImage: null
                };

                currentGift = giftObj; // وضع الهدية في الشاشة المنتصفية فوراً

                // تحميل صور الهدايا والداعم بسرعة
                if (data.profilePictureUrl) {
                  fetchImage(data.profilePictureUrl).then(img => { if(img) giftObj.avatarImage = img; });
                }
                if (data.giftPictureUrl) {
                  fetchImage(data.giftPictureUrl).then(img => { if(img) giftObj.iconImage = img; });
                }
              }
            });
            
          } else {
            console.log("⚠️ اسم المستخدم لم يحدد");
          }

          renderLoop().catch(err => {
            console.error("خطأ عام:", err);
            process.exit(1);
          });
          EOF

      - name: Start Stream
        env:
          TIKTOK_USER: "qurankareem.11com"
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node overlay.js
