name: test.04
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            fonts-noto-color-emoji \
            fonts-dejavu-core \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install Python tools
        run: pip install gdown

      - name: Install Node tools
        run: npm install tiktok-live-connector canvas node-fetch@2

      - name: Download video
        run: gdown 1QVMlr8fj3-qOR7EgVCtSxLeFYHADK4fk -O video.mp4

      - name: Download audio files
        run: |
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O a1.tmp && ffmpeg -i a1.tmp audio1.mp3 -y
          
      - name: Create playlist and merge audio
        run: |
          ls audio*.mp3 | shuf > playlist.txt
          while IFS= read -r file; do
            echo "file '$file'"
          done < playlist.txt > concat.txt
          ffmpeg -f concat -safe 0 -i concat.txt -c copy merged_audio.mp3 -y

      - name: Create overlay script
        run: |
          cat > overlay.js << 'EOF'
          const { WebcastPushConnection } = require("tiktok-live-connector");
          const { createCanvas, loadImage } = require("canvas");
          const { spawn } = require("child_process");
          const fetch = require("node-fetch");

          const TIKTOK_USER = process.env.TIKTOK_USER || "qurankareem.11com";
          const STREAM_KEY = process.env.STREAM_KEY;
          const WIDTH = 1280;
          const HEIGHT = 720;
          const FPS = 30;

          let chatEvents = [];  
          let currentGift = null; 
          let totalLikes = 0;   
          let viewerCount = 0;  // عداد المشاهدين الحية
          let floatingHearts = []; 
          let flyingJoiners = []; // تأثير متطاير للمنضمين الجدد

          const ffmpeg = spawn("ffmpeg", [
            "-f", "rawvideo",
            "-pixel_format", "rgba",
            "-video_size", `${WIDTH}x${HEIGHT}`,
            "-framerate", `${FPS}`,
            "-i", "pipe:0",
            "-stream_loop", "-1",
            "-re",
            "-i", "video.mp4",
            "-stream_loop", "-1",
            "-re",
            "-i", "merged_audio.mp3",
            "-filter_complex", "[1:v][0:v]overlay=0:0[v]",
            "-map", "[v]",
            "-map", "2:a",
            "-c:v", "libx264",
            "-preset", "veryfast",
            "-b:v", "2500k",
            "-maxrate", "2500k",
            "-bufsize", "5000k",
            "-g", "60", 
            "-c:a", "aac",
            "-b:a", "128k",
            "-ar", "44100",
            "-f", "flv",
            `rtmp://live.restream.io/live/${STREAM_KEY}`
          ]);

          ffmpeg.stderr.on("data", d => process.stderr.write(d));
          ffmpeg.on("exit", code => {
            console.error("ffmpeg خرج بكود:", code);
            process.exit(code);
          });

          async function drawFrame() {
            const canvas = createCanvas(WIDTH, HEIGHT);
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            const now = Date.now();

            // 1. رسم عداد اللايكات (أعلى اليمين)
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = "#111111";
            ctx.beginPath();
            ctx.roundRect(WIDTH - 280, 20, 260, 50, 25);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "#ff4444";
            ctx.font = "bold 24px 'DejaVu Sans'";
            ctx.textAlign = "center";
            ctx.fillText("❤️", WIDTH - 250, 53);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 20px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
            ctx.textAlign = "right";
            ctx.direction = "rtl";
            ctx.fillText(`الإعجابات: ${totalLikes.toLocaleString()}`, WIDTH - 30, 52);

            // 2. 🔥 رسم عداد المشاهدين المطور (أعلى اليسار - مثل ريستريم)
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = "#111111";
            ctx.beginPath();
            ctx.roundRect(20, 20, 220, 50, 25);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 22px 'DejaVu Sans'";
            ctx.textAlign = "center";
            ctx.fillText("👁️", 50, 53);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 20px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
            ctx.textAlign = "left";
            ctx.direction = "ltr"; // أرقام المشاهدين من اليسار لليمن بشكل صحيح
            ctx.fillText(`LIVE: ${viewerCount}`, 85, 52);

            // 3. رسم القلوب المتطايرة
            floatingHearts = floatingHearts.filter(h => now - h.startTime < h.duration);
            for (let heart of floatingHearts) {
              const age = (now - heart.startTime) / heart.duration;
              const alpha = 1 - age; 
              const x = heart.x + Math.sin(age * 7) * 30; 
              const y = heart.y - (age * 400); 
              ctx.globalAlpha = alpha;
              ctx.fillStyle = heart.color;
              ctx.font = `${heart.size}px 'DejaVu Sans'`;
              ctx.fillText("❤️", x, y);
            }
            ctx.globalAlpha = 1.0; 

            // 4. 🔥 رسم أسماء المنضمين المتطايرة من الزاوية السفلية صعوداً وتوسعاً لأعلى
            flyingJoiners = flyingJoiners.filter(j => now - j.startTime < j.duration);
            for (let j of flyingJoiners) {
              const age = (now - j.startTime) / j.duration;
              const alpha = age < 0.2 ? age / 0.2 : (age > 0.8 ? (1 - age) / 0.2 : 1);
              
              // مسار صعودي مائل: يبدأ من الزاوية اليسرى السفلية ويتجه لمنتصف الشاشة العلوي
              const x = j.startX + (age * 250); 
              const y = j.startY - (age * 450); 
              // حجم يتوسع تدريجياً مع حركته للأعلى
              const currentSize = j.startSize + (age * 12); 

              ctx.globalAlpha = alpha * 0.8;
              ctx.fillStyle = "rgba(0,0,0,0.6)";
              ctx.font = `bold ${currentSize}px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif`;
              const textWidth = ctx.measureText(j.text).width;
              
              ctx.beginPath();
              ctx.roundRect(x - 15, y - currentSize, textWidth + 30, currentSize + 15, 12);
              ctx.fill();

              ctx.globalAlpha = alpha;
              ctx.fillStyle = "#00ffcc"; // لون مميز للمنضمين الجدد
              ctx.textAlign = "left";
              ctx.direction = "rtl";
              ctx.fillText(j.text, x, y);
            }
            ctx.globalAlpha = 1.0;

            // 5. قائمة الشات المختصرة والنظيفة (تأخذ مساحة أمان وتبقى 20 ثانية)
            chatEvents = chatEvents.filter(e => now - e.time < 20000); 
            
            for (let i = 0; i < Math.min(chatEvents.length, 10); i++) {
              const e = chatEvents[i];
              const age = (now - e.time) / 20000;
              const alpha = Math.max(0, 1 - age);
              
              const y = HEIGHT - 180 - (i * 52); 
              if (y < 90) continue; 

              ctx.globalAlpha = alpha * 0.75; 
              ctx.fillStyle = "#000000";
              ctx.beginPath();
              ctx.roundRect(25, y - 36, 580, 44, 8); 
              ctx.fill();

              ctx.globalAlpha = alpha;

              // الأفاتار يظهر الآن بشكل حتمي بمجرد اكتمال تحميله في الخلفية
              if (e.avatarImage) {
                try {
                  ctx.save();
                  ctx.beginPath();
                  ctx.arc(50, y - 14, 15, 0, Math.PI * 2);
                  ctx.clip();
                  ctx.drawImage(e.avatarImage, 35, y - 29, 30, 30);
                  ctx.restore();
                } catch(err) {}
              }

              ctx.fillStyle = e.color || "#ffffff";
              ctx.font = "bold 19px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
              ctx.textAlign = "left"; 
              ctx.direction = "rtl";
              
              let printText = e.text;
              if (printText.length > 55) printText = printText.substring(0, 52) + "...";
              ctx.fillText(printText, 80, y - 7);
            }

            // 6. رسم الهدايا المنفصلة بالمنتصف
            if (currentGift && now - currentGift.startTime < 4000) {
              const gAge = (now - currentGift.startTime) / 4000;
              let gAlpha = 1;
              if (gAge < 0.15) gAlpha = gAge / 0.15;
              else if (gAge > 0.85) gAlpha = (1 - gAge) / 0.15;

              ctx.globalAlpha = gAlpha * 0.90;
              const boxWidth = 520;
              const boxHeight = 130;
              const boxX = (WIDTH - boxWidth) / 2;
              const boxY = (HEIGHT - boxHeight) / 2 - 40;

              ctx.fillStyle = "#1a0f2e"; 
              ctx.strokeStyle = "#FFD700"; 
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 20);
              ctx.fill();
              ctx.stroke();

              ctx.globalAlpha = gAlpha;

              if (currentGift.avatarImage) {
                try {
                  ctx.save();
                  ctx.beginPath();
                  ctx.arc(boxX + 55, boxY + 65, 35, 0, Math.PI * 2);
                  ctx.clip();
                  ctx.drawImage(currentGift.avatarImage, boxX + 20, boxY + 30, 70, 70);
                  ctx.restore();
                } catch(err) {}
              }

              if (currentGift.iconImage) {
                try {
                  ctx.drawImage(currentGift.iconImage, boxX + boxWidth - 105, boxY + 25, 80, 80);
                } catch(err) {}
              }

              ctx.fillStyle = "#FFD700"; 
              ctx.font = "bold 22px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
              ctx.textAlign = "center";
              ctx.direction = "rtl";
              ctx.fillText(currentGift.nameText, boxX + (boxWidth / 2) + 10, boxY + 50);

              ctx.fillStyle = "#ffffff"; 
              ctx.font = "bold 24px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
              ctx.fillText(currentGift.countText, boxX + (boxWidth / 2) + 10, boxY + 95);
            } else {
              currentGift = null;
            }

            ctx.globalAlpha = 1.0;
            return canvas.toBuffer("raw");
          }

          async function renderLoop() {
            const interval = 1000 / FPS;
            while (true) {
              const start = Date.now();
              try {
                const frame = await drawFrame();
                await new Promise((resolve, reject) => {
                  ffmpeg.stdin.write(frame, err => {
                    if (err) reject(err);
                    else resolve();
                  });
                });
              } catch (err) {
                console.error("خطأ حلقة الرسم:", err.message);
              }
              const elapsed = Date.now() - start;
              const wait = Math.max(0, interval - elapsed);
              await new Promise(r => setTimeout(r, wait));
            }
          }

          async function fetchImage(url) {
            if (!url || typeof url !== 'string' || !url.startsWith('http')) return null;
            try {
              const res = await fetch(url, { timeout: 1500 });
              if (!res.ok) return null;
              const buf = await res.buffer();
              return await loadImage(buf);
            } catch (e) { return null; }
          }

          // تم تعديل دالة الإضافة لتسجيل الحدث فوراً، وتحميل الصورة بالخلفية لضمان عدم السقوط
          function addChatEvent(text, color, avatarUrl) {
            try {
              const newEvent = {
                time: Date.now(),
                text,
                color,
                avatarImage: null
              };
              chatEvents.unshift(newEvent);
              if (chatEvents.length > 20) chatEvents.pop();

              if (avatarUrl) {
                fetchImage(avatarUrl)
                  .then(img => { if(img) newEvent.avatarImage = img; })
                  .catch(() => {});
              }
            } catch (err) {}
          }

          // دالة توليد تأثير المتطاير الحركي للمنضمين الجدد
          function addFlyingJoiner(name) {
            try {
              flyingJoiners.push({
                startTime: Date.now(),
                duration: 3500, // البقاء حركياً لمدة 3 ثوانٍ ونصف
                startX: 30,     // تبدأ الحركة من الحافة السفلية اليسرى
                startY: HEIGHT - 50,
                startSize: 16,  // الحجم المبدئي الصغير
                text: `👤 انضم ${name}`
              });
              if (flyingJoiners.length > 15) flyingJoiners.shift();
            } catch(e){}
          }

          function triggerHeartEffect() {
            const colors = ["#ff4444", "#ff6b9d", "#ff0055", "#ff85a2"];
            const count = Math.floor(Math.random() * 2) + 1;
            for(let i=0; i<count; i++) {
              floatingHearts.push({
                startTime: Date.now(),
                duration: 1500 + Math.random() * 1000, 
                x: (WIDTH - 150) + (Math.random() * 120 - 60), 
                y: HEIGHT - 40, 
                size: Math.floor(Math.random() * 12) + 22,
                color: colors[Math.floor(Math.random() * colors.length)]
              });
            }
            if (floatingHearts.length > 35) floatingHearts.shift();
          }

          if (TIKTOK_USER) {
            const tiktok = new WebcastPushConnection(TIKTOK_USER);

            function connectTikTok() {
              console.log("🔄 جاري الاتصال بـ TikTok Live...");
              tiktok.connect()
                .then(() => console.log("✅ متصل بنجاح بالبث واستقبال البيانات"))
                .catch(err => {
                  console.error("⚠️ فشل الاتصال، إعادة المحاولة:", err.message);
                  setTimeout(connectTikTok, 15000);
                });
            }

            console.log("⏳ انتظار 15 ثانية للربط...");
            setTimeout(connectTikTok, 15000);

            // تحديث عدد المشاهدين الحية بشكل آمن وتلقائي
            tiktok.on("roomUser", data => {
              if (data && data.viewerCount !== undefined) {
                viewerCount = data.viewerCount;
              }
            });

            function handleIncomingComment(data) {
              try {
                // استخراج الاسم الحقيقي أو المعرف بذكاء واختصار تام دون نصوص إضافية
                const userName = data.nickname || data.uniqueId || "متابع";
                const text = data.comment;
                const pfp = data.profilePictureUrl;

                if (text) {
                  addChatEvent(`${userName}: ${text}`, "#ffffff", pfp);
                }
              } catch (err) {}
            }

            tiktok.on("comment", data => { handleIncomingComment(data); });
            tiktok.on("chat", data => { handleIncomingComment(data); });

            // 🔥 تفعيل الدخول المتطاير بشكل أنيق ومستقل ومختصر بالكامل للعربية
            tiktok.on("join", data => {
              try {
                const userName = data.nickname || data.uniqueId || "متابع";
                addFlyingJoiner(userName);
              } catch(e){}
            });

            // استقبال المتابعات بشكل نظيف ومختصر
            tiktok.on("follow", data => {
              try {
                const userName = data.nickname || data.uniqueId || "متابع جديد";
                const pfp = data.profilePictureUrl;
                addChatEvent(`👤 ${userName} تابع الحساب الآن`, "#ff6b9d", pfp);
              } catch (err) {}
            });

            // معالجة اللايكات والعداد التراكمي للقلوب
            tiktok.on("like", data => {
              try {
                if (data.likeCount && data.likeCount > 0) {
                  totalLikes += Number(data.likeCount); 
                  triggerHeartEffect(); 
                }
              } catch (err) {}
            });

            // معالجة الهدايا
            tiktok.on("gift", data => {
              try {
                if (data.repeatEnd) {
                  const userName = data.nickname || data.uniqueId || "داعم كريم";
                  const pfp = data.profilePictureUrl;

                  const giftObj = {
                    startTime: Date.now(),
                    nameText: `${userName}`,
                    countText: `أرسل ${data.giftName} x${data.repeatCount}`,
                    avatarImage: null,
                    iconImage: null
                  };

                  currentGift = giftObj;

                  if (pfp) {
                    fetchImage(pfp).then(img => { if(img) giftObj.avatarImage = img; }).catch(()=>{});
                  }
                  if (data.giftPictureUrl) {
                    fetchImage(data.giftPictureUrl).then(img => { if(img) giftObj.iconImage = img; }).catch(()=>{});
                  }
                }
              } catch (err) {}
            });
            
          } else {
            console.log("⚠️ اسم المستخدم لم يحدد");
          }

          renderLoop().catch(err => {
            console.error("خطأ عام:", err);
            process.exit(1);
          });
          EOF

      - name: Start Stream
        env:
          TIKTOK_USER: "qurankareem.11com"
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node overlay.js
        
