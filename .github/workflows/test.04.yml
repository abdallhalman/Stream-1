name: test.04
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            fonts-noto-color-emoji \
            fonts-dejavu-core \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install Python tools
        run: pip install gdown

      - name: Install Node tools
        run: npm install tiktok-live-connector canvas node-fetch@2

      - name: Download video
        run: gdown 1QVMlr8fj3-qOR7EgVCtSxLeFYHADK4fk -O video.mp4

      - name: Download single audio file
        run: |
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O audio_temp.tmp
          ffmpeg -i audio_temp.tmp -c:a libmp3lame -q:a 2 single_audio.mp3 -y

      - name: Create overlay script
        run: |
          cat > overlay.js << 'EOF'
          const { WebcastPushConnection } = require("tiktok-live-connector");
          const { createCanvas, loadImage } = require("canvas");
          const { spawn } = require("child_process");
          const fetch = require("node-fetch");

          const TIKTOK_USER = process.env.TIKTOK_USER || "seham_amer";
          const STREAM_KEY = process.env.STREAM_KEY;
          const WIDTH = 1280;
          const HEIGHT = 720;
          const FPS = 30;

          let events = [];

          // إعداد بث FFmpeg بدقة HD 720p متوافقة تماماً مع أبعاد التفاعلات
          const ffmpeg = spawn("ffmpeg", [
            "-f", "rawvideo",
            "-pixel_format", "rgba",
            "-video_size", `${WIDTH}x${HEIGHT}`,
            "-framerate", `${FPS}`,
            "-i", "pipe:0",
            "-stream_loop", "-1",
            "-re",
            "-i", "video.mp4",
            "-stream_loop", "-1",
            "-re",
            "-i", "single_audio.mp3",
            "-filter_complex", "[1:v][0:v]overlay=0:0[v]",
            "-map", "[v]",
            "-map", "2:a",
            "-c:v", "libx264",
            "-preset", "veryfast",
            "-b:v", "2500k",
            "-maxrate", "2500k",
            "-bufsize", "5000k",
            "-g", "60", 
            "-c:a", "aac",
            "-b:a", "128k",
            "-ar", "44100",
            "-f", "flv",
            `rtmp://live.restream.io/live/${STREAM_KEY}`
          ]);

          ffmpeg.stderr.on("data", d => process.stderr.write(d));
          ffmpeg.on("exit", code => {
            console.error("ffmpeg خرج بكود:", code);
            process.exit(code);
          });

          // دالة رسم الإطارات والتفاعلات بدقة تمنع التداخل والنصوص المقطوعة
          async function drawFrame() {
            const canvas = createCanvas(WIDTH, HEIGHT);
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            const now = Date.now();
            events = events.filter(e => now - e.time < 5000); 

            for (let i = 0; i < Math.min(events.length, 6); i++) {
              const e = events[i];
              const age = (now - e.time) / 5000;
              const alpha = Math.max(0, 1 - age);
              const y = HEIGHT - 100 - (i * 70); 
              if (y < 60) continue;

              // رسم صندوق الخلفية التفاعلي
              ctx.globalAlpha = alpha * 0.65;
              ctx.fillStyle = "#000000";
              ctx.beginPath();
              ctx.roundRect(15, y - 40, 580, 56, 12); 
              ctx.fill();

              ctx.globalAlpha = alpha;

              // رسم الأفاتار بشكل دائري دقيق
              if (e.avatarImage) {
                try {
                  ctx.save();
                  ctx.beginPath();
                  ctx.arc(45, y - 12, 20, 0, Math.PI * 2);
                  ctx.clip();
                  ctx.drawImage(e.avatarImage, 25, y - 32, 40, 40);
                  ctx.restore();
                } catch(err) {}
              }

              // رسم أيقونة الهدية إن وجدت
              if (e.iconImage) {
                try {
                  ctx.drawImage(e.iconImage, 75, y - 28, 32, 32);
                } catch(err) {}
              }

              // ضبط خط النصوص لتفادي التداخل والأخطاء الإملائية
              ctx.fillStyle = e.color || "#ffffff";
              ctx.font = "bold 20px 'DejaVu Sans', 'Noto Sans Arabic', sans-serif";
              ctx.textAlign = "left"; 
              ctx.direction = "rtl";
              
              // معالجة النصوص الطويلة لمنع خروجها عن الصندوق
              let printText = e.text;
              if (printText.length > 55) {
                printText = printText.substring(0, 52) + "...";
              }
              ctx.fillText(printText, 85, y - 4);
            }

            ctx.globalAlpha = 1;
            return canvas.toBuffer("raw");
          }

          async function renderLoop() {
            const interval = 1000 / FPS;
            while (true) {
              const start = Date.now();
              try {
                const frame = await drawFrame();
                await new Promise((resolve, reject) => {
                  ffmpeg.stdin.write(frame, err => {
                    if (err) reject(err);
                    else resolve();
                  });
                });
              } catch (err) {
                console.error("خطأ في الرسم داخل الحلقة:", err.message);
              }
              const elapsed = Date.now() - start;
              const wait = Math.max(0, interval - elapsed);
              await new Promise(r => setTimeout(r, wait));
            }
          }

          async function fetchImage(url) {
            if (!url) return null;
            try {
              const res = await fetch(url, { timeout: 1500 });
              const buf = await res.buffer();
              return await loadImage(buf);
            } catch (e) {
              return null; 
            }
          }

          function addEvent(text, color, avatarUrl, iconUrl) {
            const newEvent = {
              time: Date.now(),
              text,
              color,
              avatarImage: null,
              iconImage: null
            };

            events.unshift(newEvent);
            if (events.length > 15) events.pop();

            if (avatarUrl) {
              fetchImage(avatarUrl).then(img => { if(img) newEvent.avatarImage = img; });
            }
            if (iconUrl) {
              fetchImage(iconUrl).then(img => { if(img) newEvent.iconImage = img; });
            }
          }

          if (TIKTOK_USER) {
            const tiktok = new WebcastPushConnection(TIKTOK_USER);

            function connectTikTok() {
              console.log("🔄 جاري الاتصال بحساب TikTok Live...");
              tiktok.connect()
                .then(() => console.log("✅ متصل بنجاح باستماع تفاعلات التيك توك"))
                .catch(err => {
                  console.error("⚠️ فشل الاتصال، إعادة المحاولة بعد 20 ثانية:", err.message);
                  setTimeout(connectTikTok, 20000);
                });
            }

            console.log("⏳ انتظار 15 ثانية فقط لبدء الربط السريع...");
            setTimeout(connectTikTok, 15000);

            // استماع الأحداث الأربعة بدون أخطاء إملائية في معالجة الأسماء والأرقام
            tiktok.on("comment", data => {
              addEvent(
                `${data.nickname || data.uniqueId}: ${data.comment}`,
                "#ffffff",
                data.profilePictureUrl,
                null
              );
            });

            tiktok.on("gift", data => {
              if (data.repeatEnd) {
                addEvent(
                  `🎁 ${data.nickname || data.uniqueId} أرسل ${data.giftName} x${data.repeatCount}`,
                  "#FFD700",
                  data.profilePictureUrl,
                  data.giftPictureUrl
                );
              }
            });

            tiktok.on("follow", data => {
              addEvent(
                `👤 ${data.nickname || data.uniqueId} تابع الحساب الآن`,
                "#ff6b9d",
                data.profilePictureUrl,
                null
              );
            });

            tiktok.on("like", data => {
              addEvent(
                `❤️ ${data.nickname || data.uniqueId} أرسل ${data.likeCount} إعجاب`,
                "#ff4444",
                data.profilePictureUrl,
                null
              );
            });
            
          } else {
            console.log("⚠️ اسم المستخدم لم يحدد");
          }

          renderLoop().catch(err => {
            console.error("خطأ عام في تشغيل الحلقة:", err);
            process.exit(1);
          });
          EOF

      - name: Start Stream
        env:
          TIKTOK_USER: "seham_amer"
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
        run: node overlay.js
