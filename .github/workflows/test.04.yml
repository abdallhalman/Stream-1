name: test.04
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:

      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-arabeyes libfribidi-bin
          pip install gdown

      - name: Download audio files
        run: |
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O a1.tmp && ffmpeg -i a1.tmp audio1.mp3 -y
          gdown 10Z5lBwM4zr3JsEcd_2KY7vB0qOJRjNjo -O a2.tmp && ffmpeg -i a2.tmp audio2.mp3 -y
          gdown 17nqAmBYExskUmySAzB51NAxic5XJRuLj -O a3.tmp && ffmpeg -i a3.tmp audio3.mp3 -y
          gdown 1IbkCM0FYurEzKBBWB-GYyMVA-Js2zbQM -O a4.tmp && ffmpeg -i a4.tmp audio4.mp3 -y
          gdown 1XkDh8_5rNV8CZtgMdR-82lcWAVPbxwcL -O a5.tmp && ffmpeg -i a5.tmp audio5.mp3 -y
          gdown 1BVe4zBJBYdkSgCpyWG7Xi4iMbbyVX5Eq -O a6.tmp && ffmpeg -i a6.tmp audio6.mp3 -y
          gdown 1F2LQM5tQjJkyA2u_kTzKf3uTm7gS8F_S -O a7.tmp && ffmpeg -i a7.tmp audio7.mp3 -y
          gdown 1qkBtQe6NHlKoThu4W1jIT4Nc7HoEzOef -O a8.tmp && ffmpeg -i a8.tmp audio8.mp3 -y
          gdown 1TXbWo89v0e8RMkwuuwkilB24LdCc0Xkn -O a9.tmp && ffmpeg -i a9.tmp audio9.mp3 -y
          gdown 1E6THGzxM3_Heaxp4Zh-KIIr5n59aqdtW -O a10.tmp && ffmpeg -i a10.tmp audio10.mp3 -y
          gdown 1lI1QjxrDFraxniv2Dzvs3O9s0w_kRuqx -O a11.tmp && ffmpeg -i a11.tmp audio11.mp3 -y
          gdown 1HlQRc8k574Uatup7i1Itb8J0AqLOETbG -O a12.tmp && ffmpeg -i a12.tmp audio12.mp3 -y
          gdown 1gkoZQ8Imfxorb25N3mRMpwkf7ZPwJwQU -O a13.tmp && ffmpeg -i a13.tmp audio13.mp3 -y
          gdown 1fK1m2SBkGOw5hjXnM9bpoTcH0jGdp4AL -O a14.tmp && ffmpeg -i a14.tmp audio14.mp3 -y
          gdown 1JbdI4Tpu_EtfYP3ZMjFZdAj42dVBXfoB -O a15.tmp && ffmpeg -i a15.tmp audio15.mp3 -y
          gdown 1UMkrpGqC_E_YB7qmLuBBKRnt2cOOf5HL -O a16.tmp && ffmpeg -i a16.tmp audio16.mp3 -y

      - name: Create playlist and merge
        run: |
          ls audio*.mp3 | shuf > playlist.txt
          while IFS= read -r file; do
            echo "file '$file'"
          done < playlist.txt > concat.txt
          ffmpeg -f concat -safe 0 -i concat.txt -c copy merged_audio.mp3

      - name: Start Stream
        run: |
         export TZ="Asia/Riyadh"
         FONT_PATH="/usr/share/fonts/truetype/arabeyes/ae_AlMohanad.ttf"
         
         ffmpeg -loop 1 -re -i background.jpg \
         -stream_loop -1 -re -i merged_audio.mp3 \
         -map 0:v -map 1:a \
         -vf "drawtext=fontfile=$FONT_PATH:fontsize=24:fontcolor=white:box=1:boxcolor=red@1.0:boxborderw=8:x=40:y=40:text='LIVE',
              drawtext=fontfile=$FONT_PATH:fontsize=96:fontcolor=0xF0D080:x=(w-text_w)/2:y=760:text='%{localtime\\:%H\\:%M\\:%S}',
              drawtext=fontfile=$FONT_PATH:fontsize=28:fontcolor=0xC9A84C:x=(w-text_w)/2+120:y=910:text='مكة المكرمة':text_shaping=1,
              drawtext=fontfile=$FONT_PATH:fontsize=28:fontcolor=0xC9A84C:x=(w-text_w)/2-120:y=910:text='القاهرة':text_shaping=1,
              drawtext=fontfile=$FONT_PATH:fontsize=38:fontcolor=0xDDDDDD:x=(w-text_w)/2+120:y=960:text='%{localtime\\:%H\\:%M}':text_shaping=1,
              drawtext=fontfile=$FONT_PATH:fontsize=38:fontcolor=0xDDDDDD:x=(w-text_w)/2-120:y=960:text='%{localtime\\:Africa/Cairo\\:%H\\:%M}':text_shaping=1,
              drawtext=fontfile=$FONT_PATH:fontsize=52:fontcolor=white:x=(w-text_w)/2:y=1080:text='بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ':text_shaping=1,
              drawtext=fontfile=$FONT_PATH:fontsize=34:fontcolor=0xC9A84C:x=(w-text_w)/2:y=1220:text='أهلاً بكم في بث القرآن الكريم':text_shaping=1,
              drawtext=fontfile=$FONT_PATH:fontsize=44:fontcolor=0xC9A84C:x=(w-text_w)/2:y=1450:text='✦ بث القرآن الكريم ✦':text_shaping=1" \
         -c:v libx264 -tune stillimage -pix_fmt yuv420p -profile:v main -level 3.1 -g 60 -b:v 2500k \
         -c:a aac -b:a 128k -ar 44100 \
         -shortest -f flv rtmp://live.restream.io/live/${{ secrets.STREAM_KEY }}
