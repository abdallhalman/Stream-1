name: test.04
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 359
    steps:

      - name: Install tools
        run: |
          sudo apt-get update
          # تثبيت الحزم الأساسية لدعم الخطوط العربية وتشبيك الحروف تلقائياً
          sudo apt-get install -y ffmpeg fonts-sil-amiri libfribidi-bin
          pip install gdown
        
      - name: Download background image
        run: |
          # تأكد أن هذه الصورة تحتوي على الخلفية البنفسجية والخطوط الذهبية الفاصلة فقط بدون النصوص
          gdown 1dP1OyuyBVb9FH-kkbVQaCNU_W1qkaQg7 -O background.jpg

      - name: Download audio files
        run: |
          gdown 1TOMytDgeII2GDspmHZ-kbAis-juK2iqp -O a1.tmp && ffmpeg -i a1.tmp audio1.mp3 -y
          gdown 10Z5lBwM4zr3JsEcd_2KY7vB0qOJRjNjo -O a2.tmp && ffmpeg -i a2.tmp audio10.mp3 -y

      - name: Create playlist and merge
        run: |
          ls audio*.mp3 | shuf > playlist.txt
          while IFS= read -r file; do
            echo "file '$file'"
          done < playlist.txt > concat.txt
          ffmpeg -f concat -safe 0 -i concat.txt -c copy merged_audio.mp3

      - name: Start Stream
        run: |
         # ضبط المنطقة الزمنية الأساسية للسيرفر (مكة المكرمة)
         export TZ="Asia/Riyadh"
         
         # مسار الخط العربي الممتاز المدمج في توزيعة الـ Ubuntu
         FONT_PATH="/usr/share/fonts/truetype/amiri/Amiri-Regular.ttf"
         FONT_BOLD="/usr/share/fonts/truetype/amiri/Amiri-Bold.ttf"
         
         ffmpeg -loop 1 -re -i background.jpg \
         -stream_loop -1 -re -i merged_audio.mp3 \
         -map 0:v -map 1:a \
         -vf "
          drawtext=fontfile=$FONT_BOLD:fontsize=24:fontcolor=white:box=1:boxcolor=red@1.0:boxborderw=8:x=40:y=40:text='LIVE',
          
          # 1. الساعة الرئيسية الكبيرة (اللون الذهبي الفاتح)
          drawtext=fontfile=$FONT_BOLD:fontsize=96:fontcolor=0xF0D080:x=(w-text_w)/2:y=760:text='%{localtime\\:%H\\:%M\\:%S}',
          
          # 2. عناوين التوقيت (مكة المكرمة - القاهرة)
          drawtext=fontfile=$FONT_PATH:fontsize=28:fontcolor=0xC9A84C:x=(w-text_w)/2+120:y=910:text='مكة المكرمة':text_shaping=1,
          drawtext=fontfile=$FONT_PATH:fontsize=28:fontcolor=0xC9A84C:x=(w-text_w)/2-120:y=910:text='القاهرة':text_shaping=1,
          
          # 3. الساعات الحية الفرعية (توقيت مكة الحي وتوقيت القاهرة الحي)
          drawtext=fontfile=$FONT_BOLD:fontsize=38:fontcolor=0xDDDDDD:x=(w-text_w)/2+120:y=960:text='%{localtime\\:%H\\:%M}':text_shaping=1,
          drawtext=fontfile=$FONT_BOLD:fontsize=38:fontcolor=0xDDDDDD:x=(w-text_w)/2-120:y=960:text='%{localtime\\: Africa/Cairo\\:%H\\:%M}':text_shaping=1,
          
          # 4. النص الرئيسي (الآية القرآنية باللون الأبيض والتشكيل)
          drawtext=fontfile=$FONT_BOLD:fontsize=52:fontcolor=white:x=(w-text_w)/2:y=1080:text='بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ':text_shaping=1,
          
          # 5. النص الفرعي (باللون الذهبي)
          drawtext=fontfile=$FONT_PATH:fontsize=34:fontcolor=0xC9A84C:x=(w-text_w)/2:y=1220:text='أهلاً بكم في بث القرآن الكريم':text_shaping=1,
          
          # 6. اسم القناة في الأسفل مع النجوم الذهبية
          drawtext=fontfile=$FONT_BOLD:fontsize=44:fontcolor=0xC9A84C:x=(w-text_w)/2:y=1450:text='✦ بث القرآن الكريم ✦':text_shaping=1
         " \
         -c:v libx264 -tune stillimage -pix_fmt yuv420p -profile:v main -level 3.1 -g 60 -b:v 2500k \
         -c:a aac -b:a 128k -ar 44100 \
         -shortest -f flv rtmp://live.restream.io/live/${{ secrets.STREAM_KEY }}
         
